<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capitals</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.game-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  background: #f9f7f4;
}

.header {
  text-align: center;
  margin-bottom: 10px;
  flex-shrink: 0;
}

.header h1 {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: 0.05em;
}

.header p {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 12px;
  color: #666;
  margin-top: 2px;
  letter-spacing: 0.02em;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  width: 100%;
  max-width: 420px;
}

/* --- Tile shell --- */
.tile {
  aspect-ratio: 1 / 1;
  min-width: 0;
  cursor: pointer;
  perspective: 600px;
  -webkit-perspective: 600px;
}

.tile-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  transition: transform 0.4s ease;
  -webkit-transition: -webkit-transform 0.4s ease;
  will-change: transform;
  border-radius: 8px;
}

.tile.flipped .tile-inner {
  transform: rotateY(180deg);
}

/* --- Back face (red) --- */
.tile-back,
.tile-front {
  position: absolute;
  inset: 0;
  border-radius: 8px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px;
}

.tile-back {
  background: #F9A8A8;
  border: 0.5px solid #E24B4A;
}

/* --- Front face --- */
.tile-front {
  transform: rotateY(180deg);
}

.tile.state .tile-front {
  background: #E6F1FB;
  border: 0.5px solid #B5D4F4;
}

.tile.capital .tile-front {
  background: #EEEDFE;
  border: 0.5px solid #AFA9EC;
}

.tile svg {
  width: 50%;
  height: 40%;
  display: block;
  flex-shrink: 0;
}

.tile-name {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-align: center;
  line-height: 1.2;
  margin-top: 3px;
  width: 100%;
  overflow-wrap: break-word;
  word-break: normal;
}

.tile.state .tile-name  { color: #0C447C; }
.tile.capital .tile-name { color: #3C3489; }
</style>
</head>
<body>

<div class="game-wrap">
  <div class="header">
    <h1>Capitals</h1>
    <p>Match each state to its capital</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const tiles = [
  { type: 'state', name: 'California' },
  { type: 'capital', name: 'Sacramento' },
  { type: 'state', name: 'Mississippi' },
  { type: 'capital', name: 'Jackson' },
  { type: 'state', name: 'Texas' },
  { type: 'capital', name: 'Austin' },
  { type: 'state', name: 'New Hampshire' },
  { type: 'capital', name: 'Concord' },
  { type: 'state', name: 'Nevada' },
  { type: 'capital', name: 'Carson City' },
  { type: 'state', name: 'Pennsylvania' },
  { type: 'capital', name: 'Harrisburg' },
  { type: 'state', name: 'Massachusetts' },
  { type: 'capital', name: 'Boston' },
  { type: 'state', name: 'North Carolina' },
  { type: 'capital', name: 'Raleigh' },
  { type: 'state', name: 'Oklahoma' },
  { type: 'capital', name: 'Oklahoma City' },
  { type: 'state', name: 'Rhode Island' },
  { type: 'capital', name: 'Providence' },
];

const shuffled = tiles.sort(() => Math.random() - 0.5);
const grid = document.getElementById('grid');

const blankSVG = `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <rect x="8" y="8" width="44" height="44" rx="4" fill="none" stroke="#B5D4F4" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>`;

shuffled.forEach(tile => {
  const el = document.createElement('div');
  el.className = `tile ${tile.type}`;

  const front = document.createElement('div');
  front.className = 'tile-front';

  if (tile.type === 'state') {
    front.innerHTML = blankSVG + `<div class="tile-name">${tile.name}</div>`;
  } else {
    front.innerHTML = `<div class="tile-name">${tile.name}</div>`;
  }

  const back = document.createElement('div');
  back.className = 'tile-back';

  const inner = document.createElement('div');
  inner.className = 'tile-inner';
  inner.appendChild(back);
  inner.appendChild(front);
  el.appendChild(inner);

  el.addEventListener('click', () => el.classList.toggle('flipped'));

  grid.appendChild(el);
});
</script>
</body>
</html>
