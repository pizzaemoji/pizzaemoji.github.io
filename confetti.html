<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light dark">
	<title>Pizza Emoji | Confetti!</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
function launchConfetti() {
    const container = document.getElementById('confetti-container');
    // 1. REMOVED: container.innerHTML = ''; (This allows additive bursts)

    const isDark = document.documentElement.classList.contains('dark');
    const colors = isDark
        ? ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#BDB2FF']
        : ['#F28B82', '#F7AD8F', '#FCE58E', '#81C995', '#8AB4F8', '#C58AF9'];
    
    const pieces = [];

    // Create a new batch of 160 pieces
    for (let i = 0; i < 160; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
            position: absolute;
            width: ${Math.random() * 4 + 2}px;
            height: ${Math.random() * 12 + 6}px;
            background-color: ${colors[Math.floor(Math.random() * colors.length)]};
            border-radius: 1px;
            left: 50%;
            top: 0; /* Changed from 50% since container is already positioned at 80% */
        `;
        container.appendChild(el);

        const speed = Math.random() * 12 + 4;
        const spread = Math.PI / 4; // Widened spread for a better "burst" feel
        const angle = (Math.PI / 2) + (Math.random() * spread * 2) - spread;
        
        pieces.push({
            el,
            x: 0,
            y: 0,
            vx: Math.cos(angle) * speed,
            vy: -Math.sin(angle) * speed,
            gravity: Math.random() * 0.2 + 0.15,
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() - 0.5) * 10
        });
    }

    // Local animation loop for THIS specific burst
    function animate() {
        let alive = false;
        pieces.forEach(p => {
            // Only update pieces that haven't fallen off yet
            if (p.y < window.innerHeight) {
                p.vy += p.gravity;
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotationSpeed;
                p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.rotation}deg)`;
                alive = true;
            } else if (p.el.parentNode) {
                // Remove the element from DOM once it's off-screen to save memory
                p.el.remove();
            }
        });

        if (alive) {
            requestAnimationFrame(animate);
        }
    }

    requestAnimationFrame(animate);
}
	</script>
	<style>
		.no-scrollbar::-webkit-scrollbar { display: none; }
		.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
	</style>
</head>
<body class="bg-white dark:bg-black antialiased transition-colors duration-200">
    <div class="w-full h-dvh flex flex-col bg-white dark:bg-black relative overflow-hidden">
        <main class="flex-1 w-full relative">
            <div id="confetti-container" class="absolute top-[80%] inset-0 pointer-events-none"></div>
            <div class="absolute top-[80%] left-0 right-0 flex justify-center -translate-y-1/2">
                <button onclick="launchConfetti()" class="px-8 py-4 bg-green-500 text-white font-black drop-shadow-lg text-2xl rounded-2xl active:scale-95 transition-transform">
                    Confetti!
                </button>
            </div>
        </main>
    </div>
</body>
</html>
