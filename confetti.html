<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>🎉 Confetti!</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
function launchConfetti() {
	const container = document.getElementById('confetti-container');
	// Pastels
	// const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#BDB2FF'];
	// Bold Neon
	// const colors = ['#FF3366', '#FFAC33', '#FFFF33', '#33FF57', '#33D1FF', '#8E33FF'];
	const colors = [
    '#FF6685', 
    '#FFB366', 
    '#FFF066', 
    '#66FF84', 
    '#66E0FF', 
    '#A366FF'
];
	const pieces = [];
	
	// Set number of confetti pieces
    for (let i = 0; i < 160; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
            position: absolute;
            width: ${Math.random() * 4 + 2}px;
            height: ${Math.random() * 12 + 6}px;
            background-color: ${colors[Math.floor(Math.random() * colors.length)]};
            border-radius: 1px;
            left: 50%;
            top: 80%;
        `;
        container.appendChild(el);

		// Set physics of confetti burst
        const speed = Math.random() * 16 + 4;
        const spread = Math.PI / 6; // 10=tight, 1=wide
        const angle = (Math.PI / 2) + (Math.random() * spread * 2) - spread;
        
        pieces.push({
            el,
            x: 0,
            y: 0,
            vx: Math.cos(angle) * speed,
            vy: -Math.sin(angle) * speed,
            gravity: Math.random() * 0.2 + 0.15,
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() - 0.5) * 10
        });
    }

    // Local animation loop for THIS specific burst
    function animate() {
        let alive = false;
        pieces.forEach(p => {
            // Only update pieces that haven't fallen off yet
            if (p.y < window.innerHeight) {
                p.vy += p.gravity;
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotationSpeed;
                p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.rotation}deg)`;
                alive = true;
            } else if (p.el.parentNode) {
                // Remove the element from DOM once it's off-screen to save memory
                p.el.remove();
            }
        });

        if (alive) {
            requestAnimationFrame(animate);
        }
    }

    requestAnimationFrame(animate);
}
	</script>
	<style>
		.no-scrollbar::-webkit-scrollbar { display: none; }
		.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

@keyframes rainbow-flow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes pulse-pop {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.06);
    }
}

.animate-rainbow {
    background-size: 300% auto;
    animation:
        rainbow-flow 4s linear infinite,
        pulse-pop 2s ease-in-out infinite;

    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;

    filter:
        drop-shadow(0 0 4px rgba(255,255,255,0.35))
        drop-shadow(0 0 12px rgba(255,100,255,0.25));
}
	</style>
</head>
<body class="bg-black antialiased transition-colors duration-200">
    <div class="w-full h-dvh flex flex-col relative overflow-hidden">
        <main class="flex-1 w-full relative">
            <div id="confetti-container" class="absolute inset-0 pointer-events-none"></div>
            <div class="absolute top-[90%] left-0 right-0 flex justify-center -translate-y-1/2">
				<button onclick="launchConfetti()" class="px-10 py-4 bg-white rounded-2xl active:scale-95 transition-transform touch-action-manipulation flex items-center gap-2">
					<span class="text-2xl">
						🎉
					</span>
					<span class="font-black text-2xl bg-gradient-to-r from-red-500 via-purple-500 to-blue-500 bg-clip-text text-transparent animate-gradient">
						Confetti!
					</span>
				</button>
				<p></p>
				<button onclick="launchConfetti()" class="px-8 py-4 bg-white text-2xl rounded-2xl active:scale-95 transition-transform touch-action-manipulation">
					<span class="text-2xl">
						🎉
					</span>
<span class="font-black tracking-tight text-3xl animate-rainbow
bg-gradient-to-r
from-pink-500
via-yellow-400
via-green-400
via-cyan-400
to-purple-500">
    Confetti!
</span>
				</button>
            </div>
        </main>
    </div>
</body>
</html>
