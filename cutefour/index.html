<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="https://pizzaemoji.net/cutefour/cute-four-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cute Four">
<meta property="og:type" content="website">
<meta property="og:url" content="https://pizzaemoji.net/cutefour/">
<meta property="og:title" content="Cute Four">
<meta property="og:description" content="A game for two.">
<meta property="og:image" content="https://pizzaemoji.net/cutefour/cute-four-icon.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="https://pizzaemoji.net/cutefour/cute-four-icon.png">
<title>Cute Four</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: -webkit-fill-available; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #2c3640;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 520px; padding: 0 16px; }
  .screen.active { display: flex; }

  /* WELCOME */
  #welcomeScreen { height: 100vh; height: -webkit-fill-available; justify-content: center; }
  .welcome-eyebrow {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 15px; color: #8fa0b0; letter-spacing: 0.5px; margin-bottom: 6px; text-align: center;
  }
  .welcome-title {
    font-family: 'Lora', serif; font-size: 72px; font-weight: 700;
    color: #f0ebe0; letter-spacing: -2px; text-align: center; line-height: 1;
  }
  .token-rain-stage {
    position: relative; width: 100%; flex: 1; min-height: 80px; max-height: 260px; overflow: hidden;
  }
  .falling-token {
    position: absolute; border-radius: 50%; top: -80px;
    animation: tokenFall linear infinite; will-change: transform;
  }
  .falling-token.purple  { background: #c5b3e6; }
  .falling-token.green { background: #a5d6a7; }
  @keyframes tokenFall {
    0%   { transform: translateY(0); opacity: 0; }
    8%   { opacity: var(--token-opacity); }
    88%  { opacity: var(--token-opacity); }
    100% { transform: translateY(calc(260px + 80px + var(--token-size))); opacity: 0; }
  }

  .btn-main {
    background: #e8c97a; border: none; border-radius: 16px;
    color: #2c3640; font-family: 'Nunito', sans-serif;
    font-size: 20px; font-weight: 800; padding: 16px 52px;
    cursor: pointer; transition: transform 0.1s, background 0.15s;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .btn-main:active { background: #dbb95e; transform: scale(0.98); }
  .btn-main:disabled { opacity: 0.4; cursor: default; transform: none; }
  #welcomeScreen .btn-main { margin-bottom: 40px; }

  /* SHARE */
  #shareScreen {
    height: 100vh; height: -webkit-fill-available;
    justify-content: center; overflow-y: auto;
    padding-top: 32px; padding-bottom: 32px; gap: 0;
  }
  .share-header {
    font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 700;
    color: #f0ebe0; text-align: center; margin-bottom: 24px; line-height: 1.5; padding: 0 8px;
  }
  .game-link-box {
    background: #1e2a33; border-radius: 16px; padding: 20px 24px;
    margin-bottom: 28px; width: 100%; text-align: center; border: 1px solid #2d3e4a;
  }
  .game-link-label {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 13px; color: #7a9aaa; margin-bottom: 8px;
  }
  .game-link-url {
    font-size: 17px; font-weight: 700; color: #f0ebe0;
    margin-bottom: 14px; word-break: break-all; line-height: 1.4;
  }
  .copy-btn {
    background: #2c3640; border: 1.5px solid #3d5060; border-radius: 10px;
    color: #a5d6a7; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 700; padding: 10px 24px;
    cursor: pointer; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:active { background: #3d5060; }
  .copy-btn.copied { color: #c5b3e6; }
  .color-label {
    font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 700;
    color: #f0ebe0; text-align: center; margin-bottom: 18px;
  }
  .color-choices { display: flex; gap: 20px; margin-bottom: 28px; justify-content: center; }
  .color-choice {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer; padding: 12px 18px; border-radius: 16px;
    border: 2.5px solid transparent; transition: border-color 0.15s, background 0.15s;
    background: transparent; min-width: 90px;
    -webkit-tap-highlight-color: transparent;
  }
  .color-choice:active { background: #1e2a33; }
  .color-choice.selected-purple  { border-color: #c5b3e6; background: #1e2a33; }
  .color-choice.selected-green { border-color: #a5d6a7; background: #1e2a33; }
  .choice-dot { width: 48px; height: 48px; border-radius: 50%; position: relative; }
  .choice-dot.purple { background: #c5b3e6; }
  .choice-dot.green { background: #a5d6a7; }
  .choice-dot .check {
    display: none; position: absolute; inset: 0;
    align-items: center; justify-content: center;
    font-size: 22px; color: rgba(0,0,0,0.3); font-weight: 800;
  }
  .color-choice.selected-purple .choice-dot.purple .check,
  .color-choice.selected-green .choice-dot.green .check { display: flex; }
  .choice-name { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: #8fa0b0; }
  .color-choice.selected-purple  .choice-name { color: #c5b3e6; }
  .color-choice.selected-green .choice-name { color: #a5d6a7; }

  /* WAITING */
  #waitingScreen { height: 100vh; height: -webkit-fill-available; justify-content: center; gap: 0; }
  .waiting-title {
    font-family: 'Lora', serif; font-size: 28px; font-weight: 700;
    color: #f0ebe0; text-align: center; margin-bottom: 12px;
  }
  .waiting-sub {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 17px; color: #7a9aaa; text-align: center; margin-bottom: 40px;
  }
  .waiting-dots {
    display: flex; gap: 12px; justify-content: center; margin-bottom: 48px;
  }
  .waiting-dot {
    width: 14px; height: 14px; border-radius: 50%; background: #3d5060;
    animation: waitPulse 1.4s ease-in-out infinite;
  }
  .waiting-dot:nth-child(2) { animation-delay: 0.2s; }
  .waiting-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes waitPulse {
    0%,100% { background: #3d5060; transform: scale(1); }
    50%      { background: #e8c97a; transform: scale(1.3); }
  }
  .waiting-link-box {
    background: #1e2a33; border-radius: 16px; padding: 20px 24px;
    width: 100%; text-align: center; border: 1px solid #2d3e4a;
  }

  /* GAME */
  #gameScreen {
    height: 100vh; height: -webkit-fill-available;
    justify-content: center; padding-top: 20px; padding-bottom: 20px;
    gap: 0; overflow: hidden;
  }
  .game-title-btn {
    font-family: 'Lora', serif; font-size: 17px; font-weight: 600;
    color: #7a9aaa; cursor: pointer; flex-shrink: 0;
    background: none; border: none; padding: 0; margin-bottom: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .game-title-btn:active { color: #a0bfcc; }
  .turn-banner {
    font-size: 26px; font-weight: 800; color: #f0ebe0;
    text-align: center; flex-shrink: 0; margin-bottom: 8px;
  }
  .turn-banner.win-banner { font-family: 'Lora', serif; font-weight: 700; }
  .turn-dot {
    display: inline-block; width: 18px; height: 18px;
    border-radius: 50%; vertical-align: middle; margin-right: 7px; position: relative; top: -2px;
  }

  .board-wrap {
    background: #3d4e5c; border-radius: 18px; padding: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative; width: 100%; flex-shrink: 0;
  }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cell {
    aspect-ratio: 1; border-radius: 50%; background: #243040;
    cursor: pointer; position: relative; transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:active  { background: #1a2530; }
  .cell.no-hover { cursor: default; }
  .cell.no-hover:active { background: #243040; }

  .token { position: absolute; inset: 0; border-radius: 50%; }
  .token.purple  { background: #c5b3e6; }
  .token.green { background: #a5d6a7; }

  .token.pending-purple  { animation: pendingPurple  1.1s ease-in-out infinite; }
  .token.pending-green { animation: pendingGreen 1.1s ease-in-out infinite; }
  @keyframes pendingPurple {
    0%,100% { box-shadow: 0 0 0 0px rgba(244,143,177,0); }
    50%      { box-shadow: 0 0 0 6px rgba(244,143,177,0.55); }
  }
  @keyframes pendingGreen {
    0%,100% { box-shadow: 0 0 0 0px rgba(165,214,167,0); }
    50%      { box-shadow: 0 0 0 6px rgba(165,214,167,0.55); }
  }

  .token.last-purple  { animation: lastPurple  1.6s ease-in-out infinite; }
  .token.last-green { animation: lastGreen 1.6s ease-in-out infinite; }
  @keyframes lastPurple {
    0%,100% { box-shadow: inset 0 0 0 10px rgba(140,30,70,0.55); }
    50%      { box-shadow: inset 0 0 0 2px  rgba(140,30,70,0.15); }
  }
  @keyframes lastGreen {
    0%,100% { box-shadow: inset 0 0 0 10px rgba(30,110,55,0.55); }
    50%      { box-shadow: inset 0 0 0 2px  rgba(30,110,55,0.15); }
  }

  .token.win-chase { filter: brightness(0.38); transition: filter 0.08s ease-in; }

  .token.dropping {
    animation: drop var(--drop-duration,.4s) cubic-bezier(0.22,0.61,0.36,1) forwards;
  }
  @keyframes drop {
    from { transform: translateY(var(--drop-from)); }
    to   { transform: translateY(0); }
  }

  .flash-canvas { position: absolute; pointer-events: none; }

  .confirm-wrap {
    width: 100%; display: flex; align-items: center; justify-content: center;
    height: 84px; flex-shrink: 0; margin-top: 10px;
  }
  .confirm-btn {
    background: #e8c97a; border: none; border-radius: 20px;
    color: #2c3640; font-family: 'Nunito', sans-serif;
    font-size: 26px; font-weight: 800; padding: 20px 64px;
    cursor: pointer; transition: transform 0.1s, background 0.15s;
    animation: popIn 0.18s cubic-bezier(0.175,0.885,0.32,1.275);
    -webkit-tap-highlight-color: transparent;
  }
  @keyframes popIn {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .confirm-btn:active { transform: scale(0.97); background: #dbb95e; }

  .waiting-turn {
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 20px; color: #c8d8e0; text-align: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* MODAL */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(20,30,38,0.88);
    align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #2c3640; border-radius: 24px; padding: 32px 36px;
    text-align: center; max-width: 300px; width: 88%; border: 1px solid #3d5060;
  }
  .modal-win-dot { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 16px; }
  .modal-title { font-family: 'Lora', serif; font-size: 28px; font-weight: 700; color: #f0ebe0; margin-bottom: 24px; }
  .modal-q { font-size: 22px; font-weight: 800; color: #f0ebe0; margin-bottom: 20px; }
  .modal-waiting {
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 20px; color: #c8d8e0; margin-bottom: 20px; text-align: center;
  }
  .modal-left {
    font-size: 20px; font-weight: 700; color: #c8d8e0;
    margin-bottom: 20px; text-align: center; line-height: 1.4;
  }
  .modal-btns { display: flex; gap: 12px; justify-content: center; }
  .modal-btn {
    border: none; border-radius: 12px; font-family: 'Nunito', sans-serif;
    font-size: 17px; font-weight: 700; padding: 13px 28px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .modal-btn:active { opacity: 0.85; }
  .modal-btn.yes { background: #e8c97a; color: #2c3640; }
  .modal-btn.no  { background: #3d5060; color: #f0ebe0; }
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="welcomeScreen">
  <div style="margin-bottom:8px;">
    <div class="welcome-eyebrow">a game for two</div>
    <div class="welcome-title">Cute Four</div>
  </div>
  <div class="token-rain-stage" id="rainStage"></div>
  <button class="btn-main" id="btnNewGame">New Game</button>
</div>

<!-- SHARE / COLOR PICK -->
<div class="screen" id="shareScreen">
  <div class="welcome-eyebrow" style="margin-bottom:16px;">Cute Four</div>
  <p class="share-header">Invite a friend to join your game<br>using the link below:</p>
  <div class="game-link-box">
    <div class="game-link-label">game link</div>
    <div class="game-link-url" id="shareLinkUrl">generating…</div>
    <button class="copy-btn" id="copyBtn">Copy Link</button>
  </div>
  <div class="color-label">Choose your color</div>
  <div class="color-choices">
    <div class="color-choice" id="choicePurple">
      <div class="choice-dot purple"><div class="check">&#10003;</div></div>
      <span class="choice-name">Purple</span>
    </div>
    <div class="color-choice" id="choiceGreen">
      <div class="choice-dot green"><div class="check">&#10003;</div></div>
      <span class="choice-name">Green</span>
    </div>
  </div>
  <button class="btn-main" id="letsPlayBtn" disabled>Let's Play</button>
</div>

<!-- WAITING -->
<div class="screen" id="waitingScreen">
  <div class="welcome-eyebrow" style="margin-bottom:20px;">Cute Four</div>
  <div class="waiting-title">Waiting for your friend…</div>
  <div class="waiting-sub">send them the link to join</div>
  <div class="waiting-dots">
    <div class="waiting-dot"></div>
    <div class="waiting-dot"></div>
    <div class="waiting-dot"></div>
  </div>
  <div class="waiting-link-box">
    <div class="game-link-label">game link</div>
    <div class="game-link-url" id="waitingLinkUrl"></div>
    <button class="copy-btn" id="waitingCopyBtn">Copy Link</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <button class="game-title-btn" id="btnHome">Cute Four</button>
  <div class="turn-banner" id="turnBanner"></div>
  <div class="board-wrap" id="boardWrap">
    <div class="grid" id="grid"></div>
  </div>
  <div class="confirm-wrap" id="confirmWrap"></div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-win-dot" id="modalDot"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc,
         updateDoc, onSnapshot, serverTimestamp,
         initializeFirestore, persistentLocalCache } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';

/* ── Firebase ─────────────────────────────── */
const app = initializeApp({
  apiKey:            "AIzaSyB9j5E9e4t2_-1QhEqoeQkT7paE8UzVAG4",
  authDomain:        "drop-in-game.firebaseapp.com",
  projectId:         "drop-in-game",
  storageBucket:     "drop-in-game.firebasestorage.app",
  messagingSenderId: "801313491683",
  appId:             "1:801313491683:web:05a9561e8c9a6f62fb13d6"
});
// experimentalForceLongPolling is more reliable on mobile Safari
// which aggressively kills WebSocket connections in the background
const db = initializeFirestore(app, { experimentalForceLongPolling: true });

/* ── Constants ────────────────────────────── */
const ROWS = 6, COLS = 7;
const COLOR_HEX  = { purple: '#c5b3e6', green: '#a5d6a7' };
const COLOR_NAME = { purple: 'Purple', green: 'Green' };

/* ── State ────────────────────────────────── */
let gameId = null, myRole = null, myColor = null, opponentColor = null, winnerColor = null;
let board = [], currentTurn = null, gameOver = false;
let pendingCol = null, pendingRow = null, isAnimating = false;
let lastMoveRow = null, lastMoveCol = null;
let chaseInterval = null, unsubscribe = null;

/* ── Helpers ──────────────────────────────── */
const myTurn  = () => currentTurn === myRole;
const uid     = () => Math.random().toString(36).slice(2, 9);
const gameRef = () => doc(db, 'games', gameId);
const gameUrl = () => location.origin + location.pathname + '?game=' + gameId;
const emptyBoard  = () => Array(ROWS * COLS).fill(0);
const flatBoard   = () => board.reduce((a, r) => a.concat(r), []);
const unflatBoard = flat => Array.from({length:ROWS}, (_, r) => flat.slice(r*COLS, r*COLS+COLS));

/* ── iOS viewport ─────────────────────────── */
function setVH() {
  const h = window.innerHeight + 'px';
  ['welcomeScreen','shareScreen','waitingScreen','gameScreen'].forEach(id => {
    document.getElementById(id).style.height = h;
  });
}
setVH();
window.addEventListener('resize', setVH);

/* ── Show screen ──────────────────────────── */
function show(id) {
  ['welcomeScreen','shareScreen','waitingScreen','gameScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
  setVH();
}

/* ── Wire up all static buttons ──────────────
   No onclick attributes in HTML — all listeners
   attached here inside the module scope.
─────────────────────────────────────────────── */
document.getElementById('btnNewGame')    .addEventListener('click', onNewGame);
document.getElementById('letsPlayBtn')  .addEventListener('click', onPlayer1Ready);
document.getElementById('copyBtn')      .addEventListener('click', () => copyLink('copyBtn'));
document.getElementById('waitingCopyBtn').addEventListener('click', () => copyLink('waitingCopyBtn'));
document.getElementById('btnHome')      .addEventListener('click', goHome);

document.getElementById('choicePurple')   .addEventListener('click', () => selectColor('purple'));
document.getElementById('choiceGreen')  .addEventListener('click', () => selectColor('green'));
document.getElementById('boardWrap')    .addEventListener('click', e => {
  if (pendingCol !== null && !e.target.closest('.cell')) cancelPending();
});

/* ── Rain ─────────────────────────────────── */
(function buildRain() {
  const stage = document.getElementById('rainStage');
  const tokens = [
    {size:38,color:'purple', left:0.08,dur:7.2, delay:0   },
    {size:22,color:'green',left:0.18,dur:9.8, delay:-3.1},
    {size:48,color:'purple', left:0.30,dur:11.4,delay:-1.7},
    {size:16,color:'green',left:0.42,dur:8.6, delay:-5.4},
    {size:32,color:'purple', left:0.53,dur:10.2,delay:-2.9},
    {size:26,color:'green',left:0.63,dur:7.8, delay:-4.6},
    {size:44,color:'green',left:0.73,dur:12.1,delay:-0.8},
    {size:18,color:'purple', left:0.82,dur:9.0, delay:-6.2},
    {size:30,color:'green',left:0.91,dur:8.3, delay:-3.8},
    {size:20,color:'purple', left:0.24,dur:13.0,delay:-7.1},
    {size:36,color:'green',left:0.47,dur:10.7,delay:-1.3},
    {size:14,color:'purple', left:0.68,dur:8.9, delay:-5.0},
    {size:28,color:'purple', left:0.57,dur:11.8,delay:-8.3},
    {size:42,color:'green',left:0.13,dur:14.2,delay:-2.2},
  ];
  tokens.forEach(t => {
    const el = document.createElement('div');
    el.className = 'falling-token ' + t.color;
    const op = 0.18 + (t.size/48)*0.42;
    el.style.cssText = `width:${t.size}px;height:${t.size}px;left:calc(${t.left*100}% - ${t.size/2}px);animation-duration:${t.dur}s;animation-delay:${t.delay}s;--token-opacity:${op.toFixed(2)};--token-size:${t.size}px;`;
    stage.appendChild(el);
  });
})();

/* ── Check for join link on load ─────────── */
(function checkJoinLink() {
  const gid = new URLSearchParams(location.search).get('game');
  if (gid) joinGame(gid);
})();

/* ── Player 1: new game ───────────────────── */
async function onNewGame() {
  gameId = uid();
  myRole = 'player1';
  await setDoc(gameRef(), {
    board:        emptyBoard(),
    currentTurn:  'player1',
    player1Color: null,
    player2Color: null,
    status:       'waiting',
    lastMove:     null,
    player1Rematch: null,
    player2Rematch: null,
    loserRole:    null,
    createdAt:    serverTimestamp()
  });
  document.getElementById('shareLinkUrl').textContent = gameUrl();
  document.getElementById('choicePurple').className  = 'color-choice';
  document.getElementById('choiceGreen').className = 'color-choice';
  document.getElementById('letsPlayBtn').disabled  = true;
  myColor = null;
  show('shareScreen');
}

/* ── Player 1: pick color ─────────────────── */
function selectColor(color) {
  myColor = color;
  document.getElementById('choicePurple').className  = 'color-choice' + (color==='purple' ? ' selected-purple' : '');
  document.getElementById('choiceGreen').className = 'color-choice' + (color==='green'  ? ' selected-green'  : '');
  document.getElementById('letsPlayBtn').disabled  = false;
}

/* ── Player 1: ready ──────────────────────── */
async function onPlayer1Ready() {
  if (!myColor) return;
  opponentColor = myColor === 'purple' ? 'green' : 'purple';
  await updateDoc(gameRef(), { player1Color: myColor });
  document.getElementById('waitingLinkUrl').textContent = gameUrl();
  show('waitingScreen');
  listenForGame();
}

/* ── Player 2: join ───────────────────────── */
async function joinGame(gid) {
  gameId = gid;
  myRole = 'player2';
  const snap = await getDoc(gameRef());
  if (!snap.exists()) { alert('Game not found. Ask your friend for a new link.'); return; }
  const data = snap.data();
  myColor       = data.player1Color === 'purple' ? 'green' : 'purple';
  opponentColor = data.player1Color;
  await updateDoc(gameRef(), { player2Color: myColor, status: 'active' });
  listenForGame();
}

/* ── Firestore listener ───────────────────── */
function listenForGame() {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(gameRef(), snap => {
    if (!snap.exists()) return;
    handleGameState(snap.data());
  });
}

/* ── React to state changes ───────────────── */
function handleGameState(data) {
  const onWaiting = document.getElementById('waitingScreen').classList.contains('active');
  const onGame    = document.getElementById('gameScreen').classList.contains('active');

  // Player 1 waiting: player 2 just joined
  if (data.status === 'active' && onWaiting) {
    opponentColor = myRole === 'player1' ? data.player2Color : data.player1Color;
    startGameUI(data);
    return;
  }
  // Player 2 arriving fresh from link
  if (data.status === 'active' && !onGame && !onWaiting) {
    opponentColor = myRole === 'player1' ? data.player2Color : data.player1Color;
    startGameUI(data);
    return;
  }
  // Already in game
  if (onGame) {
    // Rematch votes updated
    const modalOpen = document.getElementById('modal').classList.contains('open');
    if (data.status === 'done' && (data.player1Rematch || data.player2Rematch)) {
      handleRematchVotes(data);
      return;
    }
    // Play Again confirmed by both — reset
    if (data.status === 'active' && gameOver) {
      opponentColor = myRole === 'player1' ? data.player2Color : data.player1Color;
      startGameUI(data);
      return;
    }
    syncFromFirestore(data);
  }
}

/* ── Build game UI from Firestore state ───── */
function startGameUI(data) {
  board       = unflatBoard(data.board);
  currentTurn = data.currentTurn;
  gameOver    = false;
  lastMoveRow = data.lastMove ? data.lastMove.row : null;
  lastMoveCol = data.lastMove ? data.lastMove.col : null;
  pendingCol  = null; pendingRow = null; isAnimating = false;
  stopChase();
  document.getElementById('modal').classList.remove('open');
  show('gameScreen');
  renderBoard();
  updateBanner();
  setConfirm(myTurn() ? 'empty' : 'waiting');
}

/* ── Sync opponent move ───────────────────── */
function syncFromFirestore(data) {
  if (isAnimating) return;
  const newBoard = unflatBoard(data.board);
  currentTurn = data.currentTurn;

  let changedRow = null, changedCol = null;
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (newBoard[r][c] !== board[r][c]) { changedRow=r; changedCol=c; }

  board = newBoard;

  if (changedRow !== null && myTurn()) {
    animateOpponentDrop(changedRow, changedCol, () => {
      clearLastMoveMarker();
      lastMoveRow=changedRow; lastMoveCol=changedCol;
      const tok = getCell(changedRow,changedCol).querySelector('.token');
      if (tok) tok.classList.add('last-'+opponentColor);
      const win = checkWin(changedRow, changedCol);
      if (win) {
        gameOver=true; disableBoard();
        const opponentRole = myRole==='player1' ? 'player2' : 'player1';
        startChase(win, opponentRole);
      } else if (checkDraw()) {
        showDrawState();
      } else {
        updateBanner();
        setConfirm('empty');
      }
    });
  } else if (data.status === 'done' && !gameOver) {
    startGameUI(data);
  }
}

/* ── Animate opponent token drop ──────────── */
function animateOpponentDrop(row, col, callback) {
  isAnimating = true;
  renderBoard();
  const cell = getCell(row, col);
  const existing = cell.querySelector('.token');
  if (existing) existing.remove();

  const tok = document.createElement('div');
  tok.className = 'token ' + opponentColor;
  const boardTop = cell.getBoundingClientRect().top - document.getElementById('boardWrap').getBoundingClientRect().top;
  const dropFrom = -(boardTop + cell.offsetWidth + 16);
  const duration = Math.min(0.18 + Math.abs(dropFrom)/1600, 0.55);
  tok.style.setProperty('--drop-from', dropFrom+'px');
  tok.style.setProperty('--drop-duration', duration+'s');
  tok.classList.add('dropping');
  cell.appendChild(tok);

  setTimeout(() => {
    isAnimating = false;
    tok.classList.remove('dropping');
    if (callback) callback();
  }, duration*1000+30);
}

/* ── Render board ─────────────────────────── */
function renderBoard() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (board[r][c]) {
        const color = board[r][c] === 1 ? (myRole==='player1' ? myColor : opponentColor)
                                        : (myRole==='player2' ? myColor : opponentColor);
        const tok = document.createElement('div');
        tok.className = 'token ' + color;
        if (r===lastMoveRow && c===lastMoveCol) tok.classList.add('last-'+opponentColor);
        cell.appendChild(tok);
      }
      cell.addEventListener('click', (col => () => onCellClick(col))(c));
      grid.appendChild(cell);
    }
  }
}

const getCell    = (r,c) => document.getElementById('grid').children[r*COLS+c];
const getDropRow = col   => { for (let r=ROWS-1;r>=0;r--) if (!board[r][col]) return r; return -1; };

function clearLastMoveMarker() {
  if (lastMoveRow===null) return;
  const tok = getCell(lastMoveRow,lastMoveCol).querySelector('.token');
  if (tok) tok.classList.remove('last-purple','last-green');
}
function disableBoard() {
  document.getElementById('grid').querySelectorAll('.cell').forEach(c => {
    c.classList.add('no-hover'); c.style.cursor='default';
  });
}

/* ── Tap to place ─────────────────────────── */
function onCellClick(col) {
  if (isAnimating || gameOver || !myTurn()) return;
  const row = getDropRow(col);
  if (row===-1) return;
  if (pendingCol===col) return;
  if (pendingCol!==null) removePendingToken();

  pendingCol=col; pendingRow=row;
  board[row][col] = myRole==='player1' ? 1 : 2;

  const cell = getCell(row, col);
  const tok  = document.createElement('div');
  tok.className = 'token ' + myColor;
  tok.id = 'pending-token';

  const boardTop = cell.getBoundingClientRect().top - document.getElementById('boardWrap').getBoundingClientRect().top;
  const dropFrom = -(boardTop + cell.offsetWidth + 16);
  const duration = Math.min(0.18 + Math.abs(dropFrom)/1600, 0.55);
  tok.style.setProperty('--drop-from', dropFrom+'px');
  tok.style.setProperty('--drop-duration', duration+'s');
  tok.classList.add('dropping');
  isAnimating = true;
  cell.classList.add('no-hover');
  cell.appendChild(tok);

  setTimeout(() => {
    isAnimating = false;
    tok.classList.remove('dropping');
    tok.classList.add('pending-'+myColor);
    setConfirm('confirm');
  }, duration*1000+30);
}

function removePendingToken() {
  const old = document.getElementById('pending-token');
  if (old) { board[pendingRow][pendingCol]=0; old.remove(); getCell(pendingRow,pendingCol).classList.remove('no-hover'); }
  pendingCol=null; pendingRow=null;
  setConfirm('empty');
}

/* ── Confirm area ─────────────────────────── */
function setConfirm(state) {
  const wrap = document.getElementById('confirmWrap');
  wrap.innerHTML = '';
  if (state==='confirm') {
    const btn = document.createElement('button');
    btn.className='confirm-btn'; btn.textContent='Confirm Move';
    btn.addEventListener('click', confirmMove);
    wrap.appendChild(btn);
    setTimeout(() => { document.addEventListener('click', onOutsideClick, {capture:true}); outsideClickActive=false; }, 80);
  } else if (state==='continue') {
    const btn = document.createElement('button');
    btn.className='confirm-btn'; btn.textContent='Continue';
    btn.addEventListener('click', showNewGameModal);
    wrap.appendChild(btn);
  } else if (state==='waiting') {
    const msg = document.createElement('div');
    msg.className='waiting-turn';
    msg.textContent = `Waiting for ${COLOR_NAME[opponentColor]}'s move…`;
    wrap.appendChild(msg);
  }
}

let outsideClickActive = false;
function onOutsideClick(e) {
  if (!outsideClickActive) { outsideClickActive=true; return; }
  const wrap = document.getElementById('confirmWrap');
  const btn  = wrap.querySelector('.confirm-btn');
  if (btn && btn.contains(e.target)) return;
  if (document.getElementById('grid').contains(e.target)) return;
  cancelPending();
}
function cancelPending() {
  removePendingToken();
  document.removeEventListener('click', onOutsideClick, {capture:true});
  outsideClickActive=false;
}

/* ── Confirm and write to Firestore ─────────── */
async function confirmMove() {
  if (isAnimating||gameOver||pendingCol===null) return;
  const col=pendingCol, row=pendingRow;
  document.removeEventListener('click', onOutsideClick, {capture:true});
  outsideClickActive=false;

  const tok = document.getElementById('pending-token');
  if (!tok) return;
  tok.classList.remove('pending-'+myColor);
  tok.removeAttribute('id');
  fireFlash(getCell(row,col), myColor);

  const movedRow=row, movedCol=col;
  pendingCol=null; pendingRow=null;

  const win  = checkWin(movedRow, movedCol);
  const draw = !win && checkDraw();
  const nextTurn = myRole==='player1' ? 'player2' : 'player1';

  await updateDoc(gameRef(), {
    board:       flatBoard(),
    currentTurn: nextTurn,
    lastMove:    { row: movedRow, col: movedCol },
    status:      (win||draw) ? 'done' : 'active',
    loserRole:   win ? (myRole==='player1' ? 'player2' : 'player1') : null
  });

  setConfirm('empty');

  if (win) {
    gameOver=true; disableBoard();
    startChase(win, myRole);
  } else if (draw) {
    showDrawState();
  } else {
    clearLastMoveMarker();
    lastMoveRow=movedRow; lastMoveCol=movedCol;
    tok.classList.add('last-'+myColor);
    updateBanner();
    setConfirm('waiting');
  }
}

/* ── Banner ───────────────────────────────── */
function updateBanner() {
  const banner = document.getElementById('turnBanner');
  banner.className = 'turn-banner';
  if (myTurn()) {
    banner.innerHTML = `<span class="turn-dot" style="background:${COLOR_HEX[myColor]}"></span>Your turn`;
  } else {
    banner.innerHTML = `<span class="turn-dot" style="background:${COLOR_HEX[opponentColor]}"></span>${COLOR_NAME[opponentColor]}'s turn`;
  }
}

/* ── Chasing lights ───────────────────────── */
function startChase(cells, winnerRole) {
  const toks = cells.map(rc => getCell(rc[0],rc[1]).querySelector('.token'));
  let dimmed = 0;
  toks[dimmed].classList.add('win-chase');
  chaseInterval = setInterval(() => {
    toks[dimmed].classList.remove('win-chase');
    dimmed = (dimmed+1) % toks.length;
    toks[dimmed].classList.add('win-chase');
  }, 520);
  setTimeout(() => showWinState(winnerRole), 520*toks.length+80);
}
function stopChase() {
  if (chaseInterval!==null) { clearInterval(chaseInterval); chaseInterval=null; }
}

/* ── Win / draw ───────────────────────────── */
function showWinState(winnerRole) {
  winnerColor = winnerRole===myRole ? myColor : opponentColor;
  const banner = document.getElementById('turnBanner');
  banner.className='turn-banner win-banner';
  banner.innerHTML = `<span class="turn-dot" style="background:${COLOR_HEX[winnerColor]}"></span>${COLOR_NAME[winnerColor]} Wins!`;
  setConfirm('continue');
}
function showDrawState() {
  gameOver=true; winnerColor=null; disableBoard();
  const banner=document.getElementById('turnBanner');
  banner.className='turn-banner win-banner';
  banner.textContent="It's a draw!";
  setConfirm('continue');
}
function showNewGameModal() {
  stopChase();
  const dot   = document.getElementById('modalDot');
  const title = document.getElementById('modalTitle');
  if (winnerColor) {
    dot.style.background = COLOR_HEX[winnerColor];
    title.textContent    = COLOR_NAME[winnerColor] + ' Wins!';
  } else {
    dot.style.background = '#7a9aaa';
    title.textContent    = "It's a Draw!";
  }
  setModalState('ask');
  document.getElementById('modal').classList.add('open');
}

// modalState: 'ask' | 'waiting' | 'left' | 'gone'
function setModalState(state) {
  const body        = document.getElementById('modalBody');
  const oppName     = COLOR_NAME[opponentColor] || 'Opponent';
  body.innerHTML    = '';

  if (state === 'ask') {
    const q    = document.createElement('div');
    q.className = 'modal-q';
    q.textContent = 'Play again?';
    const btns = document.createElement('div');
    btns.className = 'modal-btns';
    const yes  = document.createElement('button');
    yes.className = 'modal-btn yes';
    yes.textContent = 'Yes!';
    yes.addEventListener('click', onPlayAgainYes);
    const no   = document.createElement('button');
    no.className = 'modal-btn no';
    no.textContent = 'No thanks';
    no.addEventListener('click', onPlayAgainNo);
    btns.appendChild(yes);
    btns.appendChild(no);
    body.appendChild(q);
    body.appendChild(btns);

  } else if (state === 'waiting') {
    const msg  = document.createElement('div');
    msg.className = 'modal-waiting';
    msg.textContent = `Waiting for ${oppName}…`;
    body.appendChild(msg);

  } else if (state === 'left') {
    // opponent said No
    const msg  = document.createElement('div');
    msg.className = 'modal-left';
    msg.textContent = `${oppName} isn't up for another round.`;
    const ok   = document.createElement('button');
    ok.className = 'modal-btn no';
    ok.style.marginTop = '4px';
    ok.textContent = 'OK';
    ok.addEventListener('click', goHome);
    body.appendChild(msg);
    body.appendChild(ok);

  } else if (state === 'gone') {
    // opponent went home without answering
    const msg  = document.createElement('div');
    msg.className = 'modal-left';
    msg.textContent = `${oppName} left the game.`;
    const ok   = document.createElement('button');
    ok.className = 'modal-btn no';
    ok.style.marginTop = '4px';
    ok.textContent = 'OK';
    ok.addEventListener('click', goHome);
    body.appendChild(msg);
    body.appendChild(ok);
  }
}

async function onPlayAgainYes() {
  // Write my vote to Firestore
  const myVoteField = myRole + 'Rematch';
  await updateDoc(gameRef(), { [myVoteField]: 'yes' });
  setModalState('waiting');
}

async function onPlayAgainNo() {
  const myVoteField = myRole + 'Rematch';
  await updateDoc(gameRef(), { [myVoteField]: 'no' });
  goHome();
}

// Called from Firestore listener when rematch votes change
function handleRematchVotes(data) {
  const p1vote = data.player1Rematch;
  const p2vote = data.player2Rematch;
  const myVote = myRole === 'player1' ? p1vote : p2vote;
  const oppVote= myRole === 'player1' ? p2vote : p1vote;

  // If both said yes → start new game
  if (p1vote === 'yes' && p2vote === 'yes') {
    document.getElementById('modal').classList.remove('open');
    updateDoc(gameRef(), {
      board:          emptyBoard(),
      currentTurn:    data.loserRole || 'player1',
      lastMove:       null,
      status:         'active',
      loserRole:      null,
      player1Rematch: null,
      player2Rematch: null
    });
    return;
  }

  // If I already voted yes and opponent said no
  if (myVote === 'yes' && oppVote === 'no') {
    setModalState('left');
    return;
  }

  // If opponent said no and I haven't voted yet
  if (oppVote === 'no' && !myVote) {
    // Show modal with opponent left message immediately
    document.getElementById('modal').classList.add('open');
    const dot   = document.getElementById('modalDot');
    const title = document.getElementById('modalTitle');
    if (winnerColor) {
      dot.style.background = COLOR_HEX[winnerColor];
      title.textContent    = COLOR_NAME[winnerColor] + ' Wins!';
    } else {
      dot.style.background = '#7a9aaa';
      title.textContent    = "It's a Draw!";
    }
    setModalState('left');
    return;
  }

  // If I voted yes and opponent hasn't answered yet — keep showing waiting
  if (myVote === 'yes' && !oppVote) {
    setModalState('waiting');
  }
}

/* ── Go home ──────────────────────────────── */
function goHome() {
  stopChase();
  if (unsubscribe) { unsubscribe(); unsubscribe=null; }
  gameId=null; myRole=null; myColor=null; opponentColor=null;
  document.getElementById('modal').classList.remove('open');
  show('welcomeScreen');
  history.replaceState({}, '', location.pathname);
}

/* ── Copy link ────────────────────────────── */
function copyLink(btnId) {
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(gameUrl()).catch(()=>{});
  btn.textContent='Copied!'; btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent='Copy Link'; btn.classList.remove('copied'); }, 2000);
}

/* ── Flash animation ──────────────────────── */
function fireFlash(cell, color) {
  const hex=COLOR_HEX[color], sz=cell.offsetWidth, csz=sz*3;
  const canvas=document.createElement('canvas');
  canvas.width=canvas.height=csz; canvas.className='flash-canvas';
  canvas.style.cssText=`width:${csz}px;height:${csz}px;left:${-sz}px;top:${-sz}px;z-index:10;`;
  cell.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const cx=csz/2,cy=csz/2,sd=sz*0.58,ll=sz*0.6,lw=Math.max(2,sz*0.055);
  let start=null;
  const frame=ts=>{
    if(!start)start=ts;
    const t=Math.min((ts-start)/380,1);
    const ease=1-Math.pow(1-t,2),op=t<0.5?1:1-((t-0.5)/0.5);
    ctx.clearRect(0,0,csz,csz);
    ctx.strokeStyle=hex;ctx.lineWidth=lw;ctx.lineCap='round';ctx.globalAlpha=op*0.9;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2,d=sd+ease*ll;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*(sd+ease*ll*0.2),cy+Math.sin(a)*(sd+ease*ll*0.2));
      ctx.lineTo(cx+Math.cos(a)*d,cy+Math.sin(a)*d);
      ctx.stroke();
    }
    t<1?requestAnimationFrame(frame):canvas.remove();
  };
  requestAnimationFrame(frame);
}

/* ── Win detection ────────────────────────── */
function checkWin(row,col) {
  const dirs=[[0,1],[1,0],[1,1],[1,-1]], p=board[row][col];
  for(const [dr,dc] of dirs){
    const cells=[[row,col]];
    for(let i=1;i<4;i++){const r=row+dr*i,c=col+dc*i;if(r<0||r>=ROWS||c<0||c>=COLS||board[r][c]!==p)break;cells.push([r,c]);}
    for(let i=1;i<4;i++){const r=row-dr*i,c=col-dc*i;if(r<0||r>=ROWS||c<0||c>=COLS||board[r][c]!==p)break;cells.push([r,c]);}
    if(cells.length>=4)return cells.slice(0,4);
  }
  return null;
}
function checkDraw(){ return board[0].every(v=>v!==0); }
