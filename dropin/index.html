<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Drop In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: -webkit-fill-available; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #2c3640;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 520px; padding: 0 16px; }
  .screen.active { display: flex; }

  /* WELCOME */
  #welcomeScreen { height: 100vh; height: -webkit-fill-available; justify-content: center; }
  .welcome-eyebrow {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 15px; color: #8fa0b0; letter-spacing: 0.5px; margin-bottom: 6px; text-align: center;
  }
  .welcome-title {
    font-family: 'Lora', serif; font-size: 72px; font-weight: 700;
    color: #f0ebe0; letter-spacing: -2px; text-align: center; line-height: 1;
  }
  .token-rain-stage {
    position: relative; width: 100%; flex: 1; min-height: 80px; max-height: 260px; overflow: hidden;
  }
  .falling-token {
    position: absolute; border-radius: 50%; top: -80px;
    animation: tokenFall linear infinite; will-change: transform;
  }
  .falling-token.pink  { background: #f48fb1; }
  .falling-token.green { background: #a5d6a7; }
  @keyframes tokenFall {
    0%   { transform: translateY(0); opacity: 0; }
    8%   { opacity: var(--token-opacity); }
    88%  { opacity: var(--token-opacity); }
    100% { transform: translateY(calc(260px + 80px + var(--token-size))); opacity: 0; }
  }

  .btn-main {
    background: #e8c97a; border: none; border-radius: 16px;
    color: #2c3640; font-family: 'Nunito', sans-serif;
    font-size: 20px; font-weight: 800; padding: 16px 52px;
    cursor: pointer; transition: transform 0.1s, background 0.15s;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .btn-main:active { background: #dbb95e; transform: scale(0.98); }
  .btn-main:disabled { opacity: 0.4; cursor: default; transform: none; }
  #welcomeScreen .btn-main { margin-bottom: 40px; }

  /* SHARE */
  #shareScreen {
    height: 100vh; height: -webkit-fill-available;
    justify-content: center; overflow-y: auto;
    padding-top: 32px; padding-bottom: 32px; gap: 0;
  }
  .share-header {
    font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 700;
    color: #f0ebe0; text-align: center; margin-bottom: 24px; line-height: 1.5; padding: 0 8px;
  }
  .game-link-box {
    background: #1e2a33; border-radius: 16px; padding: 20px 24px;
    margin-bottom: 28px; width: 100%; text-align: center; border: 1px solid #2d3e4a;
  }
  .game-link-url {
    font-size: 18px; font-weight: 700; color: #f0ebe0;
    margin-bottom: 14px; word-break: break-all; line-height: 1.3;
  }
  .copy-btn {
    background: #2c3640; border: 1.5px solid #3d5060; border-radius: 10px;
    color: #a5d6a7; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 700; padding: 10px 24px;
    cursor: pointer; transition: background 0.15s;
  }
  .copy-btn:active { background: #3d5060; }
  .copy-btn.copied { color: #f48fb1; }
  .color-label {
    font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 700;
    color: #f0ebe0; text-align: center; margin-bottom: 18px;
  }
  .color-choices { display: flex; gap: 20px; margin-bottom: 28px; justify-content: center; }
  .color-choice {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer; padding: 12px 18px; border-radius: 16px;
    border: 2.5px solid transparent; transition: border-color 0.15s, background 0.15s;
    background: transparent; min-width: 90px;
  }
  .color-choice:active { background: #1e2a33; }
  .color-choice.selected-pink  { border-color: #f48fb1; background: #1e2a33; }
  .color-choice.selected-green { border-color: #a5d6a7; background: #1e2a33; }
  .choice-dot { width: 48px; height: 48px; border-radius: 50%; position: relative; }
  .choice-dot.pink  { background: #f48fb1; }
  .choice-dot.green { background: #a5d6a7; }
  .choice-dot .check {
    display: none; position: absolute; inset: 0;
    align-items: center; justify-content: center;
    font-size: 22px; color: rgba(0,0,0,0.3); font-weight: 800;
  }
  .color-choice.selected-pink  .choice-dot.pink  .check,
  .color-choice.selected-green .choice-dot.green .check { display: flex; }
  .choice-name { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: #8fa0b0; }
  .color-choice.selected-pink  .choice-name { color: #f48fb1; }
  .color-choice.selected-green .choice-name { color: #a5d6a7; }

  /* GAME */
  #gameScreen {
    height: 100vh; height: -webkit-fill-available;
    justify-content: center;
    padding-top: 20px; padding-bottom: 20px;
    gap: 0; overflow: hidden;
  }
  .game-title-btn {
    font-family: 'Lora', serif; font-size: 17px; font-weight: 600;
    color: #7a9aaa; cursor: pointer; flex-shrink: 0;
    background: none; border: none; padding: 0; margin-bottom: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .game-title-btn:active { color: #a0bfcc; }
  .turn-banner {
    font-size: 26px; font-weight: 800; color: #f0ebe0;
    text-align: center; flex-shrink: 0; margin-bottom: 8px;
  }
  .turn-banner.win-banner { font-family: 'Lora', serif; font-weight: 700; }
  .turn-dot {
    display: inline-block; width: 18px; height: 18px;
    border-radius: 50%; vertical-align: middle; margin-right: 7px; position: relative; top: -2px;
  }

  .board-wrap {
    background: #3d4e5c; border-radius: 18px; padding: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative; width: 100%; flex-shrink: 0;
  }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cell {
    aspect-ratio: 1; border-radius: 50%; background: #243040;
    cursor: pointer; position: relative; transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:active  { background: #1a2530; }
  .cell.no-hover { cursor: default; }
  .cell.no-hover:active { background: #243040; }

  .token { position: absolute; inset: 0; border-radius: 50%; }
  .token.pink  { background: #f48fb1; }
  .token.green { background: #a5d6a7; }

  /* Pending outward glow */
  .token.pending-pink  { animation: pendingPink  1.1s ease-in-out infinite; }
  .token.pending-green { animation: pendingGreen 1.1s ease-in-out infinite; }
  @keyframes pendingPink {
    0%,100% { box-shadow: 0 0 0 0px rgba(244,143,177,0); }
    50%      { box-shadow: 0 0 0 6px rgba(244,143,177,0.55); }
  }
  @keyframes pendingGreen {
    0%,100% { box-shadow: 0 0 0 0px rgba(165,214,167,0); }
    50%      { box-shadow: 0 0 0 6px rgba(165,214,167,0.55); }
  }

  /* Opponent last move — strong inward pulse */
  .token.last-pink  { animation: lastPink  1.6s ease-in-out infinite; }
  .token.last-green { animation: lastGreen 1.6s ease-in-out infinite; }
  @keyframes lastPink {
    0%,100% { box-shadow: inset 0 0 0 10px rgba(140,30,70,0.55); }
    50%      { box-shadow: inset 0 0 0 2px  rgba(140,30,70,0.15); }
  }
  @keyframes lastGreen {
    0%,100% { box-shadow: inset 0 0 0 10px rgba(30,110,55,0.55); }
    50%      { box-shadow: inset 0 0 0 2px  rgba(30,110,55,0.15); }
  }

  /* Win chasing light — JS toggles this class on one token at a time */
  .token.win-chase {
    filter: brightness(0.38);
    transition: filter 0.08s ease-in;
  }

  .token.dropping {
    animation: drop var(--drop-duration,.4s) cubic-bezier(0.22,0.61,0.36,1) forwards;
  }
  @keyframes drop {
    from { transform: translateY(var(--drop-from)); }
    to   { transform: translateY(0); }
  }

  .flash-canvas { position: absolute; pointer-events: none; }

  .confirm-wrap {
    width: 100%; display: flex; align-items: center; justify-content: center;
    height: 56px; flex-shrink: 0; margin-top: 10px;
  }
  .confirm-btn {
    background: #e8c97a; border: none; border-radius: 14px;
    color: #2c3640; font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 800; padding: 13px 44px;
    cursor: pointer; transition: transform 0.1s, background 0.15s;
    animation: popIn 0.18s cubic-bezier(0.175,0.885,0.32,1.275);
    -webkit-tap-highlight-color: transparent;
  }
  @keyframes popIn {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .confirm-btn:active { transform: scale(0.97); background: #dbb95e; }

  /* MODAL */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(20,30,38,0.88);
    align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #2c3640; border-radius: 24px; padding: 32px 36px;
    text-align: center; max-width: 300px; width: 88%; border: 1px solid #3d5060;
  }
  .modal-win-dot { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 16px; }
  .modal-title { font-family: 'Lora', serif; font-size: 28px; font-weight: 700; color: #f0ebe0; margin-bottom: 24px; }
  .modal-q { font-size: 22px; font-weight: 800; color: #f0ebe0; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 12px; justify-content: center; }
  .modal-btn {
    border: none; border-radius: 12px; font-family: 'Nunito', sans-serif;
    font-size: 17px; font-weight: 700; padding: 13px 28px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .modal-btn:active { opacity: 0.85; }
  .modal-btn.yes { background: #e8c97a; color: #2c3640; }
  .modal-btn.no  { background: #3d5060; color: #f0ebe0; }
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="welcomeScreen">
  <div style="margin-bottom:8px;">
    <div class="welcome-eyebrow">a game for two</div>
    <div class="welcome-title">Drop In</div>
  </div>
  <div class="token-rain-stage" id="rainStage"></div>
  <button class="btn-main" onclick="goToShare()">New Game</button>
</div>

<!-- SHARE -->
<div class="screen" id="shareScreen">
  <div class="welcome-eyebrow" style="margin-bottom:16px;">Drop In</div>
  <p class="share-header">Invite a friend to join your game<br>using the link below:</p>
  <div class="game-link-box">
    <div class="game-link-url">pizzaemoji.net/four&amp;id=g7x2k9</div>
    <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy Link</button>
  </div>
  <div class="color-label">Choose your color</div>
  <div class="color-choices">
    <div class="color-choice" id="choicePink" onclick="selectColor('pink')">
      <div class="choice-dot pink"><div class="check">&#10003;</div></div>
      <span class="choice-name">Pink</span>
    </div>
    <div class="color-choice" id="choiceGreen" onclick="selectColor('green')">
      <div class="choice-dot green"><div class="check">&#10003;</div></div>
      <span class="choice-name">Green</span>
    </div>
  </div>
  <button class="btn-main" id="letsPlayBtn" onclick="startGame()" disabled>Let's Play</button>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <button class="game-title-btn" onclick="goHome()">Drop In</button>
  <div class="turn-banner" id="turnBanner"></div>
  <div class="board-wrap" id="boardWrap">
    <div class="grid" id="grid"></div>
  </div>
  <div class="confirm-wrap" id="confirmWrap"></div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-win-dot" id="modalDot"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-q">Play again?</div>
    <div class="modal-btns">
      <button class="modal-btn yes" onclick="newRound()">Yes!</button>
      <button class="modal-btn no"  onclick="goHome()">No thanks</button>
    </div>
  </div>
</div>

<script>
const ROWS = 6, COLS = 7;
let board, currentPlayer, pendingCol, pendingRow, isAnimating, gameOver;
let player1Color = null;
let lastMoveRow = null, lastMoveCol = null;
let chaseInterval = null;

const COLOR_HEX  = { pink: '#f48fb1', green: '#a5d6a7' };
const COLOR_NAME = { pink: 'Pink', green: 'Green' };
const GAME_LINK  = 'pizzaemoji.net/four&id=g7x2k9';

/* ── iOS viewport fix ─────────────────────── */
function setVH() {
  var h = window.innerHeight + 'px';
  document.getElementById('welcomeScreen').style.height = h;
  document.getElementById('shareScreen').style.height   = h;
  document.getElementById('gameScreen').style.height    = h;
}
setVH();
window.addEventListener('resize', setVH);

/* ── Rain ─────────────────────────────────── */
(function buildRain() {
  var stage = document.getElementById('rainStage');
  var tokens = [
    {size:38,color:'pink', left:0.08,dur:7.2, delay:0   },
    {size:22,color:'green',left:0.18,dur:9.8, delay:-3.1},
    {size:48,color:'pink', left:0.30,dur:11.4,delay:-1.7},
    {size:16,color:'green',left:0.42,dur:8.6, delay:-5.4},
    {size:32,color:'pink', left:0.53,dur:10.2,delay:-2.9},
    {size:26,color:'green',left:0.63,dur:7.8, delay:-4.6},
    {size:44,color:'green',left:0.73,dur:12.1,delay:-0.8},
    {size:18,color:'pink', left:0.82,dur:9.0, delay:-6.2},
    {size:30,color:'green',left:0.91,dur:8.3, delay:-3.8},
    {size:20,color:'pink', left:0.24,dur:13.0,delay:-7.1},
    {size:36,color:'green',left:0.47,dur:10.7,delay:-1.3},
    {size:14,color:'pink', left:0.68,dur:8.9, delay:-5.0},
    {size:28,color:'pink', left:0.57,dur:11.8,delay:-8.3},
    {size:42,color:'green',left:0.13,dur:14.2,delay:-2.2},
  ];
  tokens.forEach(function(t) {
    var el = document.createElement('div');
    el.className = 'falling-token ' + t.color;
    var op = 0.18 + (t.size/48)*0.42;
    el.style.cssText = 'width:'+t.size+'px;height:'+t.size+'px;left:calc('+(t.left*100)+'% - '+(t.size/2)+'px);animation-duration:'+t.dur+'s;animation-delay:'+t.delay+'s;--token-opacity:'+op.toFixed(2)+';--token-size:'+t.size+'px;';
    stage.appendChild(el);
  });
})();

/* ── Nav ──────────────────────────────────── */
function show(id) {
  ['welcomeScreen','shareScreen','gameScreen'].forEach(function(s) {
    document.getElementById(s).classList.toggle('active', s===id);
  });
  setVH();
}
function goHome() {
  stopChase();
  document.getElementById('modal').classList.remove('open');
  show('welcomeScreen');
}
function goToShare() {
  player1Color = null;
  document.getElementById('choicePink').className  = 'color-choice';
  document.getElementById('choiceGreen').className = 'color-choice';
  document.getElementById('letsPlayBtn').disabled  = true;
  show('shareScreen');
}
function selectColor(color) {
  player1Color = color;
  document.getElementById('choicePink').className  = 'color-choice'+(color==='pink'  ? ' selected-pink'  : '');
  document.getElementById('choiceGreen').className = 'color-choice'+(color==='green' ? ' selected-green' : '');
  document.getElementById('letsPlayBtn').disabled  = false;
}

/* ── Helpers ──────────────────────────────── */
function getPlayerColor(p)     { return p===1 ? player1Color : (player1Color==='pink' ? 'green' : 'pink'); }
function getPlayerColorName(p) { return COLOR_NAME[getPlayerColor(p)]; }

/* ── Game init ────────────────────────────── */
function startGame() {
  if (!player1Color) return;
  stopChase();
  board = Array.from({length:ROWS}, function(){ return Array(COLS).fill(0); });
  currentPlayer=1; pendingCol=null; pendingRow=null;
  isAnimating=false; gameOver=false;
  lastMoveRow=null; lastMoveCol=null;
  document.getElementById('modal').classList.remove('open');
  show('gameScreen');
  renderBoard(); updateBanner(); setConfirm('empty');
}
function newRound() { startGame(); }

function renderBoard() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (var r=0; r<ROWS; r++) {
    for (var c=0; c<COLS; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      if (board[r][c]) {
        var tok = document.createElement('div');
        tok.className = 'token ' + getPlayerColor(board[r][c]);
        if (r===lastMoveRow && c===lastMoveCol) {
          tok.classList.add('last-' + getPlayerColor(board[r][c]));
        }
        cell.appendChild(tok);
      }
      cell.addEventListener('click', (function(col){return function(){onCellClick(col);};})(c));
      grid.appendChild(cell);
    }
  }
}

function getCell(r,c) { return document.getElementById('grid').children[r*COLS+c]; }
function getDropRow(col) {
  for (var r=ROWS-1; r>=0; r--) { if (!board[r][col]) return r; }
  return -1;
}

function clearLastMoveMarker() {
  if (lastMoveRow===null) return;
  var tok = getCell(lastMoveRow, lastMoveCol).querySelector('.token');
  if (tok) tok.classList.remove('last-pink','last-green');
}

/* ── Tap to place ─────────────────────────── */
function onCellClick(col) {
  if (isAnimating || gameOver) return;
  var row = getDropRow(col);
  if (row===-1) return;
  if (pendingCol===col) return;
  if (pendingCol!==null) removePendingToken();

  pendingCol=col; pendingRow=row;
  board[row][col] = currentPlayer;

  var cell  = getCell(row, col);
  var color = getPlayerColor(currentPlayer);
  var tok   = document.createElement('div');
  tok.className = 'token ' + color;
  tok.id = 'pending-token';

  var boardTop = cell.getBoundingClientRect().top - document.getElementById('boardWrap').getBoundingClientRect().top;
  var dropFrom = -(boardTop + cell.offsetWidth + 16);
  var duration = Math.min(0.18 + Math.abs(dropFrom)/1600, 0.55);
  tok.style.setProperty('--drop-from',     dropFrom+'px');
  tok.style.setProperty('--drop-duration', duration+'s');
  tok.classList.add('dropping');
  isAnimating = true;
  cell.classList.add('no-hover');
  cell.appendChild(tok);

  setTimeout(function() {
    isAnimating = false;
    tok.classList.remove('dropping');
    tok.classList.add('pending-'+color);
    setConfirm('confirm');
  }, duration*1000+30);
}

function removePendingToken() {
  var old = document.getElementById('pending-token');
  if (old) {
    board[pendingRow][pendingCol] = 0;
    old.remove();
    getCell(pendingRow,pendingCol).classList.remove('no-hover');
  }
  pendingCol=null; pendingRow=null;
  setConfirm('empty');
}

/* ── Confirm area ─────────────────────────── */
function setConfirm(state) {
  var wrap = document.getElementById('confirmWrap');
  wrap.innerHTML = '';
  if (state==='confirm') {
    var btn = document.createElement('button');
    btn.className='confirm-btn'; btn.textContent='Confirm Move';
    btn.onclick=confirmMove;
    wrap.appendChild(btn);
    setTimeout(function(){
      document.addEventListener('click', onOutsideClick, {capture:true});
      outsideClickActive=false;
    }, 80);
  } else if (state==='continue') {
    var btn = document.createElement('button');
    btn.className='confirm-btn'; btn.textContent='Continue';
    btn.onclick=showNewGameModal;
    wrap.appendChild(btn);
  }
}

var outsideClickActive = false;
function onOutsideClick(e) {
  if (!outsideClickActive) { outsideClickActive=true; return; }
  var wrap = document.getElementById('confirmWrap');
  var btn  = wrap.querySelector('.confirm-btn');
  if (btn && btn.contains(e.target)) return;
  if (document.getElementById('grid').contains(e.target)) return;
  cancelPending();
}
function cancelPending() {
  removePendingToken();
  document.removeEventListener('click', onOutsideClick, {capture:true});
  outsideClickActive=false;
}

/* ── Confirm move ─────────────────────────── */
function confirmMove() {
  if (isAnimating||gameOver||pendingCol===null) return;
  var col=pendingCol, row=pendingRow;
  document.removeEventListener('click', onOutsideClick, {capture:true});
  outsideClickActive=false;

  var tok = document.getElementById('pending-token');
  if (!tok) return;
  var color = getPlayerColor(currentPlayer);
  tok.classList.remove('pending-'+color);
  tok.removeAttribute('id');

  var cell = getCell(row, col);
  fireFlash(cell, color);

  var movedRow=row, movedCol=col, movedPlayer=currentPlayer;
  pendingCol=null; pendingRow=null;
  setConfirm('empty');

  setTimeout(function() {
    var win = checkWin(movedRow, movedCol);
    if (win) {
      gameOver = true;
      document.getElementById('grid').querySelectorAll('.cell').forEach(function(c) {
        c.classList.add('no-hover'); c.style.cursor='default';
      });
      startChase(win, movedPlayer);
    } else if (checkDraw()) {
      setTimeout(showDrawState, 300);
    } else {
      clearLastMoveMarker();
      lastMoveRow=movedRow; lastMoveCol=movedCol;
      var movedTok = getCell(movedRow,movedCol).querySelector('.token');
      if (movedTok) movedTok.classList.add('last-'+color);
      currentPlayer = currentPlayer===1 ? 2 : 1;
      updateBanner();
    }
  }, 120);
}

/* ── Chasing lights win effect ───────────────
   One token darkens at a time, loops forever
   until Continue is tapped.
─────────────────────────────────────────── */
function startChase(cells, player) {
  var toks = cells.map(function(rc) {
    return getCell(rc[0],rc[1]).querySelector('.token');
  });

  var dimmed  = 0;       // index of the one dimmed token
  var stepMs  = 320;     // how long each position holds

  // dim the first token to start
  toks[dimmed].classList.add('win-chase');

  chaseInterval = setInterval(function() {
    // restore the currently dimmed token
    toks[dimmed].classList.remove('win-chase');
    // advance to next
    dimmed = (dimmed + 1) % toks.length;
    // dim the new one
    toks[dimmed].classList.add('win-chase');
  }, stepMs);

  // show banner and continue after one full pass
  setTimeout(function() {
    showWinState(player);
  }, stepMs * toks.length + 80);
}

function stopChase() {
  if (chaseInterval !== null) {
    clearInterval(chaseInterval);
    chaseInterval = null;
  }
}

/* ── Win / draw display ───────────────────── */
function showWinState(player) {
  var color=getPlayerColor(player), hex=COLOR_HEX[color];
  var banner=document.getElementById('turnBanner');
  banner.className='turn-banner win-banner';
  banner.innerHTML='<span class="turn-dot" style="background:'+hex+'"></span>'+COLOR_NAME[color]+' Wins!';
  setConfirm('continue');
}
function showDrawState() {
  gameOver=true;
  var banner=document.getElementById('turnBanner');
  banner.className='turn-banner win-banner';
  banner.textContent="It's a draw!";
  document.getElementById('grid').querySelectorAll('.cell').forEach(function(c) {
    c.classList.add('no-hover'); c.style.cursor='default';
  });
  setConfirm('continue');
}
function showNewGameModal() {
  stopChase();
  var banner=document.getElementById('turnBanner');
  var m=banner.textContent.match(/^(\w+) Wins/);
  if (m) {
    document.getElementById('modalDot').style.background=COLOR_HEX[m[1].toLowerCase()]||'#7a9aaa';
    document.getElementById('modalTitle').textContent=m[1]+' Wins!';
  } else {
    document.getElementById('modalDot').style.background='#7a9aaa';
    document.getElementById('modalTitle').textContent="It's a Draw!";
  }
  document.getElementById('modal').classList.add('open');
}

/* ── Flash ────────────────────────────────── */
function fireFlash(cell, color) {
  var hex=COLOR_HEX[color], sz=cell.offsetWidth, csz=sz*3;
  var canvas=document.createElement('canvas');
  canvas.width=canvas.height=csz; canvas.className='flash-canvas';
  canvas.style.cssText='width:'+csz+'px;height:'+csz+'px;left:'+-sz+'px;top:'+-sz+'px;z-index:10;';
  cell.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  var cx=csz/2,cy=csz/2,sd=sz*0.58,ll=sz*0.6,lw=Math.max(2,sz*0.055);
  var start=null;
  function frame(ts){
    if(!start)start=ts;
    var t=Math.min((ts-start)/380,1);
    var ease=1-Math.pow(1-t,2),op=t<0.5?1:1-((t-0.5)/0.5);
    ctx.clearRect(0,0,csz,csz);
    ctx.strokeStyle=hex;ctx.lineWidth=lw;ctx.lineCap='round';ctx.globalAlpha=op*0.9;
    for(var i=0;i<8;i++){
      var a=(i/8)*Math.PI*2,d=sd+ease*ll;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*(sd+ease*ll*0.2),cy+Math.sin(a)*(sd+ease*ll*0.2));
      ctx.lineTo(cx+Math.cos(a)*d,cy+Math.sin(a)*d);
      ctx.stroke();
    }
    if(t<1){requestAnimationFrame(frame);}else{canvas.remove();}
  }
  requestAnimationFrame(frame);
}

/* ── Win detection ────────────────────────── */
function checkWin(row,col){
  var dirs=[[0,1],[1,0],[1,1],[1,-1]],p=board[row][col];
  for(var d=0;d<dirs.length;d++){
    var dr=dirs[d][0],dc=dirs[d][1],cells=[[row,col]];
    for(var i=1;i<4;i++){var r=row+dr*i,c=col+dc*i;if(r<0||r>=ROWS||c<0||c>=COLS||board[r][c]!==p)break;cells.push([r,c]);}
    for(var i=1;i<4;i++){var r=row-dr*i,c=col-dc*i;if(r<0||r>=ROWS||c<0||c>=COLS||board[r][c]!==p)break;cells.push([r,c]);}
    if(cells.length>=4)return cells.slice(0,4);
  }
  return null;
}
function checkDraw(){ return board[0].every(function(v){return v!==0;}); }

function updateBanner(){
  var color=COLOR_HEX[getPlayerColor(currentPlayer)];
  var name=getPlayerColorName(currentPlayer);
  var banner=document.getElementById('turnBanner');
  banner.className='turn-banner';
  banner.innerHTML='<span class="turn-dot" style="background:'+color+'"></span>'+name+"'s turn";
}

function copyLink(){
  var btn=document.getElementById('copyBtn');
  navigator.clipboard.writeText(GAME_LINK).catch(function(){});
  btn.textContent='Copied!'; btn.classList.add('copied');
  setTimeout(function(){btn.textContent='Copy Link';btn.classList.remove('copied');},2000);
}

document.getElementById('boardWrap').addEventListener('click',function(e){
  if(pendingCol!==null&&!e.target.closest('.cell'))cancelPending();
});
