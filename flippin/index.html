<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flippin'</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: #f9f7f4;
  color: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Georgia, "Times New Roman", serif;
}

.screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 32px 24px;
  text-align: center;
}

.emoji {
  font-size: 52px;
  line-height: 1;
  margin-bottom: 4px;
}

h1 {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1;
}

.subtitle {
  font-size: 15px;
  font-weight: 400;
  color: #888;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}

.btn {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #1a1a1a;
  background: #f9f7f4;
  border: 1.5px solid #1a1a1a;
  border-radius: 10px;
  padding: 14px 32px;
  cursor: pointer;
  width: 260px;
  text-decoration: none;
  display: block;
  transition: background 0.15s, color 0.15s;
}

.btn:active {
  background: #1a1a1a;
  color: #f9f7f4;
}

.btn.disabled {
  color: #bbb;
  border-color: #ddd;
  pointer-events: none;
  cursor: default;
}

.coming-soon {
  font-size: 12px;
  font-style: italic;
  color: #bbb;
  margin-top: -6px;
  letter-spacing: 0.02em;
}
</style>
</head>
<body>

<div class="screen">
  <div class="emoji">👀</div>
  <h1>Flippin'</h1>
  <p class="subtitle">A Flip and Match Game</p>
  <a class="btn" href="uscapitals.html">Play US Capitals</a>
  <a class="btn disabled">Play European Capitals</a>
  <p class="coming-soon">coming soon</p>
</div>

</body>
</html>
