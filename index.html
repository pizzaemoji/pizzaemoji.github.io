<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Pizza Emoji</title>
	<meta name="author" content="Brandon Butler">
	<meta name="pronouns" content="he/him">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
	<meta name="description" content="Pizza Emoji - A small pictorial symbol that represents a slice of delicious baked dough with tomato sauce, cheese, and various toppings.">
	<meta name="theme-color" content="#26282D">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<link rel="canonical" href="https://pizzaemoji.net/">
	<link rel="shortcut icon" href="/favicon/favicon.ico">
	<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
	<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96">
	<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
	<link rel="manifest" href="/favicon/site.webmanifest">
	 <!-- Open Graph -->
	<meta property="og:type"        content="website">
	<meta property="og:url"         content="https://pizzaemoji.net/">
	<meta property="og:title"       content="Pizza Emoji">
	<meta property="og:description" content="A small pictorial symbol that represents a slice of delicious baked dough with tomato sauce, cheese, and various toppings.">
	<meta property="og:image"       content="https://pizzaemoji.net/images/og-cover.png">
	<meta property="og:image:type"  content="image/png">
	<meta property="og:image:width" content="1200">
	<meta property="og:image:height"content="630">
	<meta property="og:image:alt"   content="Pizza Emoji dot Net">
	<style>
		body {
			background-color: rgb(38, 40, 45);
			height: 100svh;
			margin: 0;
		}
		#pizza {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100svh;
		}
		#emoji {
			width: 80%;
		}
		@media (min-width: 640px)  { #emoji { width: 60%; } }
		@media (min-width: 1024px) { #emoji { width: 40%; } }
	</style>
</head>
<body>
	<div id="pizza">
		<img
			src="/images/pizzaemoji_slice3d.webp"
			srcset="/images/pizzaemoji_slice3d.webp 1x, /images/pizzaemoji_slice3d@2x.webp 2x"
			alt="The Pizza Emoji Slice Logo in 3D"
			id="emoji"
		>
	</div>
</body>
