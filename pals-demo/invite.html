<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Pals | Invite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind.config = { darkMode: 'class' }

        function applyTheme() {
            const useSystem = localStorage.getItem('pals-use-system') === 'true';
            const savedTheme = localStorage.getItem('pals-theme');
            let isDark = useSystem ? window.matchMedia('(prefers-color-scheme: dark)').matches : savedTheme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
        }
        applyTheme();
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Subtle pulse for the NFC area */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .animate-pulse-slow { animation: pulse-slow 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 antialiased transition-colors duration-200">

    <div class="w-full h-dvh flex flex-col bg-white dark:bg-black shadow-2xl relative overflow-hidden mx-auto max-w-2xl">
        
        <header class="flex justify-between items-center px-6 pt-6 pb-4 shrink-0 border-b border-gray-50 dark:border-zinc-900">
            <a href="user_profile.html" class="text-zinc-800 dark:text-zinc-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <img src="images/Pals_Logo.png" alt="Pals" class="h-7 brightness-100">
            <div class="flex gap-4 items-center">
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-8 py-10 no-scrollbar flex flex-col items-center text-center">
            <h1 class="text-2xl font-bold text-zinc-900 dark:text-white mb-4">Invite a Pal</h1>
            <div class="relative w-64 h-64 flex items-center justify-center mb-10">
                <div class="absolute inset-0 border-2 border-red-500/20 rounded-full animate-pulse-slow"></div>
                <div class="absolute inset-4 border-2 border-red-500/10 rounded-full animate-pulse-slow" style="animation-delay: 1s"></div>
                
                <div class="z-10 bg-red-500 text-white w-32 h-32 rounded-3xl shadow-2xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-12 h-12">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.348 14.651a3.75 3.75 0 0 1 0-5.303m5.304 0a3.75 3.75 0 0 1 0 5.303m-7.425 2.122a6.75 6.75 0 0 1 0-9.546m9.547 0a6.75 6.75 0 0 1 0 9.546M5.106 18.894c-3.808-3.808-3.808-9.982 0-13.79m13.788 0c3.808 3.808 3.808 9.982 0 13.79" />
                    </svg>
                </div>
            </div>

            <h2 class="text-2xl font-black text-zinc-900 dark:text-white mb-4">Tap Phones to Invite</h2>
            <p class="text-zinc-600 dark:text-zinc-400 mb-12 leading-relaxed">
                Pals is designed for the people you know in the real world. To invite someone, just tap your phones together.
            </p>

            <div class="w-full space-y-4">
                <button class="w-full py-4 bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-white font-bold rounded-2xl active:scale-[0.98] transition-transform">
                    Or Show an Invite QR Code
                </button>
                <button class="w-full py-4 bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-white font-bold rounded-2xl active:scale-[0.98] transition-transform">
                    Or Copy an Invite Link<br>
                    (to send over text or email)
                </button>
            </div>

        </main>
    </div>

</body>
</html>
