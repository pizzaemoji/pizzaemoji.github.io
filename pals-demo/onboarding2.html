<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Pals | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind.config = { darkMode: 'class' }

        function applyTheme() {
            const useSystem = localStorage.getItem('pals-use-system') === 'true';
            const savedTheme = localStorage.getItem('pals-theme');
            let isDark = useSystem ? window.matchMedia('(prefers-color-scheme: dark)').matches : savedTheme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
        }
        applyTheme();
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Subtle pulse for the NFC area */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .animate-pulse-slow { animation: pulse-slow 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 antialiased transition-colors duration-200">

    <div class="w-full h-dvh flex flex-col items-center justify-between px-8 py-16 bg-white dark:bg-black shadow-2xl relative overflow-hidden mx-auto max-w-2xl">
        
		<div class="w-full bg-red-500/10 dark:bg-red-500/20 border-b border-red-500/20 py-2 text-center shrink-0 z-50">
			<span class="text-[10px] font-black text-red-500 uppercase tracking-[0.2em]">Onboarding Demo</span>
        </div>

        <main class="flex-1 overflow-y-auto px-8 py-10 no-scrollbar flex flex-col items-center text-center">
            <h1 class="text-2xl font-bold text-zinc-900 dark:text-white mb-4">Join Pals</h1>

            <div class="relative w-64 h-64 flex items-center justify-center mb-10">
                <div class="absolute inset-0 border-2 border-red-500/20 rounded-full animate-pulse-slow"></div>
                <div class="absolute inset-4 border-2 border-red-500/10 rounded-full animate-pulse-slow" style="animation-delay: 1s"></div>
                
                <div class="z-10 bg-red-500 text-white w-32 h-32 rounded-3xl shadow-2xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-12 h-12">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.348 14.651a3.75 3.75 0 0 1 0-5.303m5.304 0a3.75 3.75 0 0 1 0 5.303m-7.425 2.122a6.75 6.75 0 0 1 0-9.546m9.547 0a6.75 6.75 0 0 1 0 9.546M5.106 18.894c-3.808-3.808-3.808-9.982 0-13.79m13.788 0c3.808 3.808 3.808 9.982 0 13.79" />
                    </svg>
                </div>
            </div>

            <h2 class="text-2xl font-black text-zinc-900 dark:text-white mb-4">Tap Phones to Join</h2>
            <p class="text-zinc-600 dark:text-zinc-400 mb-12 leading-relaxed">
                Pals is designed for the people you know in the real world. To join, just tap your phones together.
            </p>

            <div class="w-full space-y-4">
                <button class="w-full py-4 bg-zinc-500 dark:bg-zinc-500 text-zinc-500 dark:text-zinc-500 font-bold rounded-2xl active:scale-[0.98] transition-transform">
                    Or Open Camera to Scan QR Code
                </button>
<button onclick="toggleDrawer()" class="mt-auto py-4 px-8 bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-white font-bold rounded-2xl w-full active:scale-[0.98] transition-transform">
                Use an invite link
            </button>
            </div>

        </main>
        
<div id="overlay" onclick="toggleDrawer()" class="absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-40"></div>
        
        <div id="linkDrawer" class="absolute bottom-0 left-0 right-0 bg-white dark:bg-zinc-900 rounded-t-[3rem] p-10 transform translate-y-full transition-transform duration-500 ease-out z-50 shadow-[0_-20px_50px_rgba(0,0,0,0.2)]">
            <div class="w-12 h-1.5 bg-zinc-200 dark:border-zinc-800 rounded-full mx-auto mb-8"></div>
            
            <h2 class="text-2xl font-black text-zinc-900 dark:text-white mb-4">Paste Invite Link</h2>
            <p class="text-zinc-600 dark:text-zinc-400 mb-8 leading-relaxed text-[15px]">
                If you received a link to join Pals, just tap the link in your email or texts. Or, you can paste the invite link in the box below.
            </p>

            <div class="space-y-4">
                <div class="bg-zinc-50 dark:bg-black rounded-2xl p-4 border border-zinc-100 dark:border-zinc-800">
                    <input type="text" placeholder="https://pals.app/invite/..." class="w-full bg-transparent border-none outline-none text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 font-medium">
                </div>
                
                <button class="w-full py-4 bg-red-500 text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all">
                    Accept Invite
                </button>
            </div>
        </div>
    </div>

</body>
</html>
