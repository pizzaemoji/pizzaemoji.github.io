<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Pals | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind.config = { darkMode: 'class' }

        function applyTheme() {
            const useSystem = localStorage.getItem('pals-use-system') === 'true';
            const savedTheme = localStorage.getItem('pals-theme');
            let isDark = useSystem ? window.matchMedia('(prefers-color-scheme: dark)').matches : savedTheme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
        }
        applyTheme();

        function toggleDrawer() {
            const panel = document.getElementById('linkDrawer');
            const overlay = document.getElementById('overlay');
            panel.classList.toggle('translate-y-full');
            overlay.classList.toggle('opacity-0');
            overlay.classList.toggle('pointer-events-none');
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .animate-pulse-slow { animation: pulse-slow 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 antialiased transition-colors duration-200">

    <div class="w-full h-dvh flex flex-col items-center bg-white dark:bg-black shadow-2xl relative overflow-hidden mx-auto max-w-2xl">
        
        <div class="w-full bg-red-500/10 dark:bg-red-500/20 border-b border-red-500/20 py-2 text-center shrink-0 z-30">
            <span class="text-[10px] font-black text-red-500 uppercase tracking-[0.2em]">Onboarding Demo</span>
        </div>

        <header class="w-full flex justify-between items-center px-6 pt-6 pb-2 shrink-0 z-30">
            <a href="onboarding1.html" class="p-2 -ml-2 text-zinc-900 dark:text-white active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <div class="w-10"></div> 
        </header>

        <main class="flex-1 w-full overflow-y-auto no-scrollbar flex flex-col items-center px-8 pb-32">
            
            <div class="mt-8 text-center">
                <h2 class="text-3xl font-black text-zinc-900 dark:text-white mb-2 tracking-tighter">Accept an Invite</h2>
                <p class="text-zinc-500 dark:text-zinc-400 text-base">Tap phones to join Pals.</p>
            </div>

            <div class="relative w-72 h-72 flex items-center justify-center my-12 shrink-0">
                <div class="absolute inset-0 border-2 border-red-500/20 rounded-full animate-pulse-slow"></div>
                <div class="absolute inset-6 border-2 border-red-500/10 rounded-full animate-pulse-slow" style="animation-delay: 1s"></div>
                
                <div class="z-10 bg-red-500 text-white w-32 h-32 rounded-[2.5rem] shadow-2xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-12 h-12">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.348 14.651a3.75 3.75 0 0 1 0-5.303m5.304 0a3.75 3.75 0 0 1 0 5.303m-7.425 2.122a6.75 6.75 0 0 1 0-9.546m9.547 0a6.75 6.75 0 0 1 0 9.546M5.106 18.894c-3.808-3.808-3.808-9.982 0-13.79m13.788 0c3.808 3.808 3.808 9.982 0 13.79" />
                    </svg>
                </div>
            </div>

            <div class="w-full space-y-3 mt-auto">
                <button class="w-full py-4 bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-white font-bold rounded-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                    </svg>
                    Scan QR Code
                </button>
                
                <button onclick="toggleDrawer()" class="w-full py-4 bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-white font-bold rounded-2xl active:scale-[0.98] transition-all">
                    Paste an Invite Link
                </button>
            </div>
        </main>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-50">
            <a href="onboarding3.html" class="flex items-center gap-2 px-4 py-2 bg-zinc-900/90 dark:bg-white/90 text-white dark:text-black rounded-full text-xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                Simulate NFC Tap
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3 h-3">
                    <path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z" clip-rule="evenodd" />
                </svg>
            </a>
        </div>

        <div id="overlay" onclick="toggleDrawer()" class="absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-40"></div>
        <div id="linkDrawer" class="absolute bottom-0 left-0 right-0 bg-white dark:bg-zinc-900 rounded-t-[3rem] p-10 transform translate-y-full transition-transform duration-500 ease-out z-50 shadow-[0_-20px_50px_rgba(0,0,0,0.2)]">
            <div class="w-12 h-1.5 bg-zinc-200 dark:bg-zinc-800 rounded-full mx-auto mb-8"></div>
            <h2 class="text-2xl font-black text-zinc-900 dark:text-white mb-4">Paste Invite Link</h2>
            <p class="text-zinc-600 dark:text-zinc-400 mb-8 text-[15px]">If you received a link to join Pals, you can paste it below.</p>
            <div class="space-y-4">
                <div class="bg-zinc-50 dark:bg-black rounded-2xl p-4 border border-zinc-100 dark:border-zinc-800">
                    <input type="text" placeholder="Paste link here..." class="w-full bg-transparent border-none outline-none text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 font-medium">
                </div>
                <button class="w-full py-4 bg-red-500 text-white font-bold rounded-2xl">Accept Invite</button>
            </div>
        </div>
    </div>

</body>
</html>
