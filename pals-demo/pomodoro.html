<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Pals | Pomodoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
	<script src="pals.js"></script>
    <style>
        /* Customizing the native time picker appearance for iOS */
        input[type="time"]::-webkit-calendar-picker-indicator {
            display: none;
        }
        /* Removes default focus rings for a cleaner feel */
        input:focus { outline: none; }
    </style>
</head>
<body class="bg-white dark:bg-black antialiased transition-colors duration-200">
	<div class="w-full h-dvh flex flex-col bg-white dark:bg-black relative overflow-hidden mx-auto max-w-2xl">
		<header class="w-full flex justify-between items-center px-4 pt-4 pb-4 shrink-0 border-b border-zinc-100 dark:border-zinc-900">
			<a href="profile.html" class="w-10 text-zinc-800 dark:text-zinc-200 active:scale-90 transition-transform">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
					<path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
				</svg>
			</a>
			<img src="images/Pals_Logo.png" alt="Pals" class="h-7">
			<div class="w-10 flex justify-end items-center">
			</div>
		</header>
		<main class="flex-1 overflow-y-auto no-scrollbar px-8 py-8 text-zinc-900 dark:text-zinc-100">
			<h1 class="text-2xl font-black text-zinc-900 dark:text-zinc-100 leading-tight mb-2">
				Set pomodoro duration
			</h1>
			<article class="space-y-10 text-zinc-700 dark:text-zinc-300 leading-relaxed text-lg">
				This will turn on the pomodoro timer and silence all notifications from Pals. You can cancel the timer at any time. (The pomodoro timer is not functional in the demo.)
			</article>
			<div class="w-full flex justify-center items-center gap-4 bg-zinc-50 dark:bg-zinc-900 p-10 rounded-[3rem] border-2 border-zinc-100 dark:border-zinc-800 mb-12">
				<div class="flex flex-col items-center">
					<select class="bg-transparent text-5xl font-black text-zinc-900 dark:text-zinc-100 appearance-none cursor-pointer outline-none focus:ring-0">
						<option value="0">0</option>
						<option value="1" selected>1</option>
						<option value="2">2</option>
						<option value="3">3</option>
						<option value="4">4</option>
					</select>
					<span class="text-[10px] font-black uppercase tracking-widest text-zinc-400 mt-2">
					Hours
					</span>
				</div>
				<div class="text-4xl font-black text-red-500 pb-6">
				:
				</div>
				<div class="flex flex-col items-center">
					<select class="bg-transparent text-5xl font-black text-zinc-900 dark:text-zinc-100 appearance-none cursor-pointer outline-none focus:ring-0">
						<option value="0" selected>00</option>
						<option value="1">01</option>
						<option value="2">02</option>
						<option value="3">03</option>
						<option value="4">04</option>
						<option value="5">05</option>
						<option value="6">06</option>
						<option value="7">07</option>
						<option value="8">08</option>
						<option value="9">09</option>
						<option value="10">10</option>

						<option value="12">12</option>
						<option value="13">13</option>
						<option value="14">14</option>
						<option value="15">15</option>
						<option value="16">16</option>
						<option value="17">17</option>
						<option value="18">18</option>
						<option value="19">19</option>
						<option value="20">20</option>
						<option value="21">21</option>
						<option value="22">22</option>
						<option value="23">23</option>
						<option value="24">24</option>
						<option value="25">25</option>
						<option value="26">26</option>
						<option value="27">27</option>
						<option value="28">28</option>
						<option value="29">29</option>
						<option value="30">30</option>
						<option value="31">31</option>
						<option value="32">32</option>
						<option value="33">33</option>
						<option value="34">34</option>
						<option value="35">35</option>
						<option value="36">36</option>
						<option value="37">37</option>
						<option value="38">38</option>
						<option value="39">39</option>
						<option value="40">40</option>
						<option value="41">41</option>
						<option value="42">42</option>
						<option value="43">43</option>
						<option value="44">44</option>
						<option value="45">45</option>
						<option value="46">46</option>
						<option value="47">47</option>
						<option value="48">48</option>

						<option value="55">55</option>
						<option value="56">56</option>
						<option value="57">57</option>
						<option value="58">58</option>
						<option value="59">59</option>
					</select>
					<span class="text-[10px] font-black uppercase tracking-widest text-zinc-400 mt-2">
					Minutes
					</span>
				</div>
			</div>
			<div class="w-full mt-auto pb-16">
				<button class="w-full py-5 rounded-full bg-red-500 text-white text-xl font-black shadow-lg shadow-red-500/20 active:scale-[0.98] transition-all">
					Start Focus
				</button>
			</div>
		</main>
	</div>
</body>
</html>
