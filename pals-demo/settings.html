<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pals | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Check for saved theme preference or use system preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Pals Red Toggle Style */
        input:checked ~ .dot { transform: translateX(100%); background-color: white; }
        input:checked ~ .block { background-color: #EF4444; } /* Pals Red */
    </style>
</head>
<body class="bg-gray-100 dark:bg-zinc-900 antialiased">

    <div class="max-w-md mx-auto h-screen flex flex-col bg-white dark:bg-black shadow-2xl overflow-hidden relative">
        
        <header class="flex justify-between items-center px-6 pt-6 pb-4 shrink-0 border-b border-gray-50 dark:border-zinc-800">
            <a href="user_profile.html" class="text-zinc-800 dark:text-zinc-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <h1 class="text-lg font-bold text-zinc-900 dark:text-white">Settings</h1>
            <div class="w-6"></div>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar pb-20">
            
            <div class="mt-6 px-6">
                <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">Account</h2>
                <div class="space-y-4">
                    <button class="w-full flex justify-between items-center py-2 text-zinc-800 dark:text-zinc-200">
                        <span>Change Phone Number</span>
                        <span class="text-zinc-400">→</span>
                    </button>
                    <button class="w-full flex justify-between items-center py-2 text-zinc-800 dark:text-zinc-200 border-t border-gray-50 dark:border-zinc-800 pt-4">
                        <span>Change Password</span>
                        <span class="text-zinc-400">→</span>
                    </button>
                </div>
            </div>

            <div class="mt-10 px-6">
                <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">Appearance</h2>
                <div class="flex items-center justify-between py-2">
                    <span class="text-zinc-800 dark:text-zinc-200">Dark Mode</span>
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" class="sr-only" onchange="toggleDarkMode()" id="darkToggle">
                            <div class="block bg-gray-200 dark:bg-zinc-800 w-12 h-7 rounded-full transition"></div>
                            <div class="dot absolute left-1 top-1 bg-white dark:bg-zinc-400 w-5 h-5 rounded-full transition shadow-sm"></div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mt-10 px-6">
                <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">Notifications</h2>
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <span class="text-zinc-800 dark:text-zinc-200">New Messages</span>
                        <label class="flex items-center cursor-pointer">
                            <div class="relative">
                                <input type="checkbox" class="sr-only">
                                <div class="block bg-gray-200 dark:bg-zinc-800 w-12 h-7 rounded-full transition"></div>
                                <div class="dot absolute left-1 top-1 bg-white dark:bg-zinc-400 w-5 h-5 rounded-full transition shadow-sm"></div>
                            </div>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-zinc-800 dark:text-zinc-200">New Moments</span>
                        <label class="flex items-center cursor-pointer">
                            <div class="relative">
                                <input type="checkbox" class="sr-only">
                                <div class="block bg-gray-200 dark:bg-zinc-800 w-12 h-7 rounded-full transition"></div>
                                <div class="dot absolute left-1 top-1 bg-white dark:bg-zinc-400 w-5 h-5 rounded-full transition shadow-sm"></div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="mt-10 px-6">
                <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">Privacy</h2>
                <button class="w-full flex justify-between items-center py-2 text-zinc-800 dark:text-zinc-200">
                    <span>Blocked Pals</span>
                    <span class="text-zinc-400">→</span>
                </button>
            </div>

            <div class="mt-16 px-6 pb-10">
                <button class="w-full py-4 rounded-2xl bg-red-50 dark:bg-red-950/20 text-red-500 font-bold active:scale-95 transition-transform text-center">
                    Log Out
                </button>
            </div>

        </main>
    </div>
</body>
</html>
