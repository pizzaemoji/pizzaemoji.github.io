<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Pals | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind.config = { darkMode: 'class' }

        function applyTheme() {
            const useSystem = localStorage.getItem('pals-use-system') === 'true';
            const savedTheme = localStorage.getItem('pals-theme');
            let isDark = useSystem ? window.matchMedia('(prefers-color-scheme: dark)').matches : savedTheme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
        }
        applyTheme();
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Lock viewport to prevent rubber-banding */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body class="bg-white dark:bg-black antialiased transition-colors duration-200">

    <div class="w-full h-dvh flex flex-col bg-white dark:bg-black shadow-2xl relative overflow-hidden">
            
<header class="w-full flex justify-between items-center px-6 pt-6 pb-4 shrink-0 border-b border-zinc-100 dark:border-zinc-900">
    
    <div class="w-10 flex items-center">
        <a href="index.html" class="text-zinc-800 dark:text-zinc-200 active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
        </a>
    </div>

    <img src="images/Pals_Logo.png" alt="Pals" class="h-7">

    <div class="w-10 flex justify-end items-center">
        <button onclick="toggleMenu()" class="text-zinc-800 dark:text-zinc-200 z-[60] active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </button>
    </div>

</header>

        <main class="flex-1 px-8 pt-4 flex flex-col items-start overflow-y-auto no-scrollbar">
            
		<div class="w-full bg-red-500/10 dark:bg-red-500/20 border-b border-red-500/20 py-2 text-center shrink-0 z-50">
			<span class="text-[10px] font-black text-red-500 uppercase tracking-[0.2em]">Sign-in Demo</span>
        </div>
            
            <div class="mb-12">
                <h1 class="text-4xl font-black text-zinc-900 dark:text-zinc-100 mb-4 tracking-tight">
                    Welcome back, Pal!
                </h1>
                <p class="text-lg text-zinc-500 dark:text-zinc-400 leading-snug max-w-[280px]">
                    Enter your number and we'll text you a secure sign-in link.
                </p>
            </div>

            <div class="w-full mb-10">
                <label class="block text-xl font-black uppercase tracking-widest text-zinc-400 mb-4 ml-1">
                    Your Phone Number
                </label>
                <div class="relative flex items-center border-b-2 border-zinc-100 dark:border-zinc-800 focus-within:border-red-500 transition-colors pb-2">
                    <span class="text-2xl font-bold text-zinc-400 mr-3">+1</span>
                    <input type="tel" placeholder="000-123-4567" 
                        class="w-full bg-transparent py-2 text-3xl font-black text-zinc-900 dark:text-zinc-100 outline-none placeholder:text-zinc-100 dark:placeholder:text-zinc-900">
                </div>
            </div>

            <div class="w-full mt-auto pb-16">
                <button class="w-full py-5 rounded-3xl bg-red-500 text-white text-xl font-black shadow-lg shadow-red-500/20 active:scale-[0.98] transition-all">
                    Request Sign-in Text
                </button>
                <p class="w-full text-center mt-6 text-base text-zinc-400">
                    Standard message and data rates may apply.
                </p>
            </div>

        </main>
    </div>
</body>
</html>
