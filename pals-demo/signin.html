<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Pals | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind.config = { darkMode: 'class' }

        function applyTheme() {
            const useSystem = localStorage.getItem('pals-use-system') === 'true';
            const savedTheme = localStorage.getItem('pals-theme');
            let isDark = useSystem ? window.matchMedia('(prefers-color-scheme: dark)').matches : savedTheme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
        }
        applyTheme();
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Lock viewport to prevent rubber-banding */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 antialiased transition-colors duration-200">

    <div class="w-full h-dvh flex flex-col bg-white dark:bg-black shadow-2xl relative overflow-hidden mx-auto max-w-2xl">
        
        <div class="w-full bg-red-500/10 dark:bg-red-500/20 border-b border-red-500/20 py-2 text-center shrink-0 z-50">
            <span class="text-[10px] font-black text-red-500 uppercase tracking-[0.2em]">Onboarding Demo</span>
        </div>

        <header class="p-6">
            <a href="onboarding1.html" class="text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
        </header>

        <main class="flex-1 px-8 pt-4 flex flex-col items-start overflow-y-auto no-scrollbar">
            
            <div class="mb-12">
                <h1 class="text-4xl font-black text-zinc-900 dark:text-zinc-100 mb-4 tracking-tight">
                    Welcome back.
                </h1>
                <p class="text-lg text-zinc-500 dark:text-zinc-400 leading-snug max-w-[280px]">
                    Enter your number to receive a secure sign-in link.
                </p>
            </div>

            <div class="w-full mb-10">
                <label class="block text-[11px] font-black uppercase tracking-widest text-zinc-400 mb-4 ml-1">
                    Your Phone Number
                </label>
                <div class="relative flex items-center border-b-2 border-zinc-100 dark:border-zinc-800 focus-within:border-red-500 transition-colors pb-2">
                    <span class="text-2xl font-bold text-zinc-400 mr-3">+1</span>
                    <input type="tel" placeholder="555-000-0000" 
                        class="w-full bg-transparent py-2 text-3xl font-black text-zinc-900 dark:text-zinc-100 outline-none placeholder:text-zinc-100 dark:placeholder:text-zinc-900">
                </div>
            </div>

            <div class="flex gap-4 items-start bg-zinc-50 dark:bg-zinc-900/50 p-6 rounded-[2rem] border border-zinc-100 dark:border-zinc-800">
                <div class="text-red-500 mt-1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
                    </svg>
                </div>
                <p class="text-sm text-zinc-500 dark:text-zinc-400 leading-relaxed">
                    Pals uses passwordless sign-in to keep your account secure. We will never share your number or use it for marketing.
                </p>
            </div>

            <div class="w-full mt-auto pb-16">
                <button class="w-full py-5 rounded-3xl bg-red-500 text-white text-xl font-black shadow-lg shadow-red-500/20 active:scale-[0.98] transition-all">
                    Send Access Link
                </button>
                <p class="w-full text-center mt-6 text-xs text-zinc-400">
                    Standard message and data rates may apply.
                </p>
            </div>

        </main>
    </div>
</body>
</html>
