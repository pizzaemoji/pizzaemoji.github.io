<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pals | Mia Fisher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 antialiased">

    <div class="max-w-md mx-auto h-screen flex flex-col bg-white shadow-2xl relative overflow-hidden">
        
        <header class="flex justify-between items-center px-6 pt-6 pb-4 shrink-0 border-b border-gray-50">
            <a href="index.html" class="text-zinc-800">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <img src="images/Pals_Logo.png" alt="Pals" class="h-7">
            <div class="flex gap-4 items-center">
                <button onclick="toggleMenu()" class="text-zinc-800 z-[60]">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-8 pt-12 flex flex-col items-center text-center no-scrollbar">
            
            <div class="relative mb-6">
                <img src="images/User_Icon.png" alt="Mia Fisher" class="w-40 h-40 rounded-full border-4 border-gray-50 object-cover shadow-lg">
            </div>

            <h1 class="text-3xl font-bold text-zinc-900 mb-1">Mia Fisher</h1>
            <p class="text-zinc-400 font-medium mb-6">she/her</p>

            <div class="max-w-xs">
                <p class="text-zinc-700 text-lg mb-4">
                    Living in Humboldt with my 🐈
                </p>
                <p class="text-zinc-400 italic text-sm">
                    Pal since Jan 2026
                </p>
            </div>
            
        </main>
        
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] z-50">
            <div class="flex items-center gap-3 px-3 py-3 rounded-[32px] bg-transparent">
        
                <button class="w-12 h-12 rounded-full flex items-center justify-center bg-white/70 backdrop-blur-xl border border-white shadow-lg active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-zinc-800">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                    </svg>
                </button>

                <div class="flex-1 flex items-center gap-3 h-12 px-4 rounded-full bg-white/70 backdrop-blur-xl border border-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-zinc-400">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                    </svg>
                    <span class="text-zinc-400 font-medium select-none text-sm">Search</span>
                </div>
            </div>
        </div>
        
    </div>
    
    <div id="menuOverlay" onclick="toggleMenu()" class="absolute inset-0 bg-black/40 backdrop-blur-[2px] z-[70] opacity-0 pointer-events-none transition-opacity duration-200"></div>

    <div id="settingsMenu" class="absolute top-0 right-0 w-[70%] h-screen bg-white z-[80] translate-x-full transition-transform duration-200 ease-out shadow-2xl">
        <div class="flex flex-col h-full pt-16">
            
            <div class="px-6 py-2 border-b border-gray-100">
                <button class="w-full text-left py-3 text-zinc-800 font-medium active:opacity-50">Edit Profile</button>
                <button class="w-full text-left py-3 text-red-500 font-medium active:opacity-50">Invite</button>
                <button class="w-full text-left py-3 text-zinc-800 font-medium active:opacity-50">Shop</button>
            </div>

            <div class="px-6 py-2 border-b border-gray-100">
                <a href="settings.html" class="block w-full text-left py-3 text-zinc-800 font-medium active:opacity-50">Settings</a>
            </div>

            <div class="px-6 py-2 border-b border-gray-100">
                <a href="about.html" class="block w-full text-left py-3 text-zinc-800 font-medium active:opacity-50">About</a>
                <button class="w-full text-left py-3 text-zinc-800 font-medium active:opacity-50">Privacy</button>
                <button class="w-full text-left py-3 text-zinc-800 font-medium active:opacity-50">App Support</button>
            </div>
            
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('settingsMenu');
            const overlay = document.getElementById('menuOverlay');
            
            menu.classList.toggle('translate-x-full');
            overlay.classList.toggle('opacity-0');
            overlay.classList.toggle('pointer-events-none');
        }
    </script>
    
</body>
</html>
