<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinn</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const COLS = 3, ROWS = 5;
const WAND_LEN = 80;   // fixed px — dot spacing equals this
const CELL = WAND_LEN; // dots are exactly WAND_LEN apart
const DOT_R = 8;
const SPEED = 0.038;   // radians per frame

let W, H, dots, goalDot, startDot;

function buildGrid() {
  const gridW = (COLS - 1) * CELL;
  const gridH = (ROWS - 1) * CELL;
  const originX = (W - gridW) / 2;
  const originY = (H - gridH) / 2;

  dots = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      dots.push({
        col: c, row: r,
        x: originX + c * CELL,
        y: originY + r * CELL
      });
    }
  }
  goalDot  = dots.find(d => d.col === 1 && d.row === 0);
  startDot = dots.find(d => d.col === 1 && d.row === 4);
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildGrid();
}

let state = {};
let pulseT = 0;
let animId;

function restartGame() {
  cancelAnimationFrame(animId);
  state = {
    pivotDot: startDot,
    angle: -Math.PI / 2,
    dir: 1,
    won: false,
    held: false,
    visited: new Set([startDot])
  };
  loop();
}

function getTip(angle) {
  const a = angle !== undefined ? angle : state.angle;
  return {
    x: state.pivotDot.x + Math.cos(a) * WAND_LEN,
    y: state.pivotDot.y + Math.sin(a) * WAND_LEN
  };
}

// Check if the tip swept past a dot between prevAngle and nextAngle
// by testing multiple substeps along the arc this frame
function checkSweep(prevAngle, nextAngle) {
  const STEPS = 8;
  for (let i = 0; i <= STEPS; i++) {
    const a = prevAngle + (nextAngle - prevAngle) * (i / STEPS);
    const tx = state.pivotDot.x + Math.cos(a) * WAND_LEN;
    const ty = state.pivotDot.y + Math.sin(a) * WAND_LEN;
    for (const d of dots) {
      if (d === state.pivotDot) continue;
      const dx = tx - d.x, dy = ty - d.y;
      if (Math.sqrt(dx * dx + dy * dy) < 6) {
        return { dot: d, angle: a };
      }
    }
  }
  return null;
}

function update() {
  pulseT += 0.05;
  if (state.won) return;

  const prevAngle = state.angle;
  const nextAngle = state.angle + SPEED * state.dir;

  if (state.held) {
    const hit = checkSweep(prevAngle, nextAngle);
    if (hit) {
      const newAngle = Math.atan2(
        state.pivotDot.y + Math.sin(hit.angle) * WAND_LEN - hit.dot.y,
        state.pivotDot.x + Math.cos(hit.angle) * WAND_LEN - hit.dot.x
      );
      state.angle = newAngle;
      state.dir *= -1;
      state.pivotDot = hit.dot;
      state.visited.add(hit.dot);
      if (hit.dot === goalDot) state.won = true;
      return;
    }
  }

  state.angle = nextAngle;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  for (const d of dots) {
    const isGoal  = d === goalDot;
    const isPivot = d === state.pivotDot;
    const visited = state.visited.has(d);

    if (isGoal) {
      const pulse = 0.5 + 0.5 * Math.sin(pulseT);
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R + 10 + pulse * 6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,140,${0.07 + 0.06 * pulse})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R + 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,160,${0.2 + 0.15 * pulse})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = '#ffff99';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = isPivot ? '#5588cc' : visited ? '#2a4a7a' : '#1a2540';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
      ctx.strokeStyle = isPivot ? '#88aaee' : '#2a3e6a';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  const tip = getTip();
  ctx.beginPath();
  ctx.moveTo(state.pivotDot.x, state.pivotDot.y);
  ctx.lineTo(tip.x, tip.y);
  ctx.strokeStyle = state.won ? 'rgba(200,220,255,0)' : '#c8e0ff';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(tip.x, tip.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = state.won ? 'transparent' : '#ffffff';
  ctx.fill();

  if (state.won) {
    const pulse = 0.5 + 0.5 * Math.sin(pulseT * 3);
    ctx.beginPath();
    ctx.arc(goalDot.x, goalDot.y, DOT_R + 16 + pulse * 10, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,100,${0.15 + 0.1 * pulse})`;
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,180,0.9)';
    ctx.font = `bold ${Math.round(W * 0.07)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('you made it', W / 2, H * 0.55);
    ctx.font = `${Math.round(W * 0.035)}px sans-serif`;
    ctx.fillStyle = 'rgba(200,220,255,0.6)';
    ctx.fillText('tap to play again', W / 2, H * 0.62);
  }
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resize(); restartGame(); });

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (state.won) { restartGame(); return; }
  state.held = true;
});
canvas.addEventListener('pointerup',    e => { e.preventDefault(); state.held = false; });
canvas.addEventListener('pointerleave', e => { state.held = false; });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.won) { restartGame(); return; }
    state.held = true;
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { e.preventDefault(); state.held = false; }
});

resize();
restartGame();
</script>
</body>
</html>
