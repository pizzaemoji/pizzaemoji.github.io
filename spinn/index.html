<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinn</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const COLS = 3, ROWS = 5;
let W, H, PAD_X, PAD_Y, CELL_X, CELL_Y, WAND_LEN, CATCH_R, DOT_R;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  PAD_X  = W * 0.22;
  PAD_Y  = H * 0.10;
  CELL_X = (W - PAD_X * 2) / (COLS - 1);
  CELL_Y = (H - PAD_Y * 2) / (ROWS - 1);
  WAND_LEN = Math.min(CELL_X, CELL_Y) * 0.92;
  CATCH_R  = WAND_LEN * 0.35;
  DOT_R    = Math.max(7, W * 0.022);
  buildDots();
}

let dots = [], goalDot, startDot;

function buildDots() {
  dots = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      dots.push({
        col: c, row: r,
        x: PAD_X + c * CELL_X,
        y: PAD_Y + r * CELL_Y
      });
    }
  }
  goalDot  = dots.find(d => d.col === 1 && d.row === 0);
  startDot = dots.find(d => d.col === 1 && d.row === 4);
}

let state = {};
let pulseT = 0;
let animId;

function restartGame() {
  cancelAnimationFrame(animId);
  state = {
    pivotDot: startDot,
    angle: -Math.PI / 2,
    dir: 1,
    speed: 0.032,
    won: false,
    visited: new Set()
  };
  state.visited.add(startDot);
  loop();
}

function getTip() {
  return {
    x: state.pivotDot.x + Math.cos(state.angle) * WAND_LEN,
    y: state.pivotDot.y + Math.sin(state.angle) * WAND_LEN
  };
}

function trySwing() {
  if (state.won) { restartGame(); return; }
  const tip = getTip();

  // velocity direction of the tip at this moment (tangent to current rotation)
  // tangent = perpendicular to wand, in direction of rotation
  const wandAngle = state.angle;
  const tipVx = -Math.sin(wandAngle) * state.dir;
  const tipVy =  Math.cos(wandAngle) * state.dir;

  let closest = null, closestDist = Infinity;
  for (const d of dots) {
    if (d === state.pivotDot) continue;
    const dx = tip.x - d.x, dy = tip.y - d.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < CATCH_R && dist < closestDist) {
      closest = d;
      closestDist = dist;
    }
  }

  if (closest) {
    // new wand vector: from new pivot to tip
    const newWandX = tip.x - closest.x;
    const newWandY = tip.y - closest.y;
    const newAngle = Math.atan2(newWandY, newWandX);

    // cross product of new wand vector and tip velocity
    // positive = tip moving counterclockwise around new pivot
    // negative = clockwise
    const cross = newWandX * tipVy - newWandY * tipVx;
    const newDir = cross > 0 ? 1 : -1;

    state.angle = newAngle;
    state.dir *= -1;
    state.pivotDot = closest;
    state.visited.add(closest);
    if (closest === goalDot) state.won = true;
  }
}

function update() {
  pulseT += 0.05;
  if (state.won) return;
  state.angle += state.speed * state.dir;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  for (const d of dots) {
    const isGoal  = d === goalDot;
    const isPivot = d === state.pivotDot;
    const visited = state.visited.has(d);

    if (isGoal) {
      const pulse = 0.5 + 0.5 * Math.sin(pulseT);
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R + 10 + pulse * 6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,140,${0.07 + 0.06 * pulse})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R + 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,160,${0.2 + 0.15 * pulse})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = '#ffff99';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = isPivot ? '#5588cc' : visited ? '#2a4a7a' : '#1a2540';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
      ctx.strokeStyle = isPivot ? '#88aaee' : '#2a3e6a';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  if (!state.won) {
    const tip = getTip();
    ctx.beginPath();
    ctx.moveTo(state.pivotDot.x, state.pivotDot.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.strokeStyle = '#c8e0ff';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
  }

  if (state.won) {
    const pulse = 0.5 + 0.5 * Math.sin(pulseT * 3);
    ctx.beginPath();
    ctx.arc(goalDot.x, goalDot.y, DOT_R + 16 + pulse * 10, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,100,${0.15 + 0.1 * pulse})`;
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,180,0.9)';
    ctx.font = `bold ${Math.round(W * 0.07)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('you made it', W / 2, H * 0.55);
    ctx.font = `${Math.round(W * 0.035)}px sans-serif`;
    ctx.fillStyle = 'rgba(200,220,255,0.6)';
    ctx.fillText('tap to play again', W / 2, H * 0.62);
  }
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resize(); restartGame(); });
canvas.addEventListener('pointerdown', e => { e.preventDefault(); trySwing(); });
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); trySwing(); }
});

resize();
restartGame();
</script>
</body>
</html>
